<!DOCTYPE html>
<html lang="sr" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Moj Planer</title>
    <link rel="icon" type="image/x-icon" href="/moj-planer/favicon.ico">
    <link rel="apple-touch-icon" href="/moj-planer/favicon.ico">
    <link rel="shortcut icon" href="/moj-planer/favicon.ico">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        /* ===== ROOT VARIJABLE ===== */
        :root {
            --bg: #060a12;
            --bg-secondary: #0a1420;
            --panel: #132033;
            --panel-hover: #1a2d4a;
            --text: #f4f7fb;
            --text-secondary: #dbe9ff;
            --muted: #9fb0c7;
            --border: rgba(52, 152, 219, 0.18);
            --border-hover: rgba(52, 152, 219, 0.35);
            --input-bg: #0f1a2b;
            --shadow: 0 16px 38px rgba(0,0,0,0.45);
            --shadow-light: 0 4px 20px rgba(0,0,0,0.2);
            --blue: #3498db;
            --green: #2ecc71;
            --red: #e74c3c;
            --yellow: #f1c40f;
            --teal: #1abc9c;
            --orange: #e67e22;
            --radius: 18px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== SVETLA TEMA ===== */
        [data-theme="light"] {
            --bg: #f0f4f8;
            --bg-secondary: #e8edf2;
            --panel: #ffffff;
            --panel-hover: #f5f7fa;
            --text: #1a1a2e;
            --text-secondary: #2d3748;
            --muted: #4a5568;
            --border: rgba(0, 0, 0, 0.1);
            --border-hover: rgba(52, 152, 219, 0.3);
            --input-bg: #f7fafc;
            --shadow: 0 16px 38px rgba(0,0,0,0.1);
            --shadow-light: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: var(--transition);
        }

        /* ===== LAYOUT ===== */
        .wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 14px;
            display: grid;
            grid-template-columns: 330px 1fr;
            gap: 14px;
            height: 100vh;
            overflow: hidden;
        }

        .left {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: auto;
            padding-right: 2px;
        }

        .right {
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow: hidden;
            min-width: 0;
        }

        /* ===== PANELI ===== */
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .panel:hover {
            border-color: var(--border-hover);
        }

        .section { padding: 14px 16px; }

        /* ===== STATISTIKA ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 4px 6px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.06);
        }
        [data-theme="light"] .stat-card {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.06);
        }
        .stat-card:hover {
            transform: translateY(-1px);
            border-color: var(--border-hover);
        }
        .stat-number {
            font-size: 16px;
            font-weight: 800;
            display: block;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 1px;
            display: block;
        }
        .stat-card.total .stat-number { color: var(--blue); }
        .stat-card.active .stat-number { color: var(--green); }
        .stat-card.done .stat-number { color: var(--muted); }
        .stat-card.shared .stat-number { color: var(--teal); }

        /* ===== DUGMICI ===== */
        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 12px;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            user-select: none;
            text-align: center;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-light); }
        .btn:active { transform: scale(0.97); }

        .btn.green { background: linear-gradient(180deg, #2ecc71, #22b15a); }
        .btn.gray { background: linear-gradient(180deg, #34495e, #273647); }
        .btn.red { background: linear-gradient(180deg, #c0392b, #a5281d); }
        .btn.blue { background: linear-gradient(180deg, #3498db, #246fb0); }
        .btn.teal { background: linear-gradient(180deg, #1abc9c, #16a085); }
        .btn.purple { background: linear-gradient(180deg, #9b59b6, #7d3c98); }
        .btn.orange { background: linear-gradient(180deg, #e67e22, #d35400); }
        .btn.alarm-btn { background: linear-gradient(180deg, #e74c3c, #c0392b); animation: pulse-alarm 1s infinite; }

        .btn.small { padding: 8px 10px; font-size: 12px; border-radius: 10px; }

        @keyframes pulse-alarm {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== DUGME ZA TEMU ===== */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text);
            background: var(--panel);
        }
        .theme-toggle:hover {
            transform: rotate(30deg);
            border-color: var(--border-hover);
        }

        /* ===== CHIPS (kategorije) ===== */
        .chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chip {
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 7px 11px;
            background: #223444;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            transition: var(--transition);
        }
        [data-theme="light"] .chip {
            background: #e2e8f0;
            color: #2d3748;
        }
        .chip:hover { transform: translateY(-1px); background: #2b4566; }
        [data-theme="light"] .chip:hover { background: #d0d8e0; }
        .chip.active { background: var(--blue); color: #fff; }
        .chip.active-teal { background: var(--teal); box-shadow: 0 0 10px rgba(26, 188, 156, 0.5); color: #fff; }
        .chip.teal-chip { background: #163d31; color: #1abc9c; border: 1px solid rgba(26, 188, 156, 0.35); }
        [data-theme="light"] .chip.teal-chip { background: #e0f2f1; }
        .chip.teal-chip.active-teal { background: var(--teal); color: #fff; }
        .chip.orange-chip { background: #3d2616; color: #e67e22; border: 1px solid rgba(230, 126, 34, 0.35); }
        [data-theme="light"] .chip.orange-chip { background: #fdebd0; }
        .chip.orange-chip.active-orange { background: var(--orange); color: #fff; }

        /* ===== KALENDAR ===== */
        .calendar { padding: 14px; }
        .cal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 16px;
        }
        .cal-nav {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 10px;
            border-radius: 8px;
            transition: var(--transition);
        }
        .cal-nav:hover { background: var(--border); }
        .cal-view-toggle {
            display: flex;
            gap: 4px;
        }
        .cal-view-toggle button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: var(--transition);
        }
        .cal-view-toggle button.active {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }
        .cal-view-toggle button:hover:not(.active) {
            background: var(--border);
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .dayname {
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            padding-bottom: 3px;
        }
        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: var(--bg-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            position: relative;
            min-height: 40px;
            transition: var(--transition);
            color: var(--text);
        }
        .day:hover { background: var(--panel-hover); transform: scale(1.05); }
        .day.today { background: #1f8f4b; font-weight: 800; box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); color: #fff; }
        .day.sel { outline: 2px solid var(--blue); background: var(--panel-hover); }
        .day .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--yellow);
            box-shadow: 0 0 4px var(--yellow);
            margin-top: 2px;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Nedeljni kalendar */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .week-day {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 8px 4px;
            min-height: 80px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }
        .week-day:hover { background: var(--panel-hover); }
        .week-day .day-number {
            font-weight: 700;
            font-size: 14px;
            display: block;
            margin-bottom: 4px;
        }
        .week-day.today .day-number { color: var(--green); }
        .week-day .week-task {
            font-size: 10px;
            background: var(--blue);
            color: #fff;
            border-radius: 4px;
            padding: 2px 4px;
            margin: 2px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .week-day .week-task.done-task {
            background: var(--muted);
            opacity: 0.5;
            text-decoration: line-through;
        }
        .week-day .week-task.alarm-task {
            background: var(--yellow);
            color: #000;
            animation: pulse 1.6s infinite;
        }

        /* ===== FORMA ===== */
        .form { padding: 16px; flex-shrink: 0; }
        .form-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .title {
            font-size: 15px;
            font-weight: 800;
            margin: 0;
            color: var(--text);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1.1fr 1.1fr 1.2fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .save-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            align-items: stretch;
        }
        .save-row .btn { flex: 1; }

        #notif-bar {
            display: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* ===== ALARM POPUP ===== */
        #alarmOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        #alarmOverlay.active {
            display: flex;
        }
        .alarm-box {
            background: var(--panel);
            border: 3px solid var(--red);
            border-radius: 24px;
            padding: 30px 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 60px rgba(231, 76, 60, 0.4);
            animation: pulse-alarm-box 1s infinite;
        }
        @keyframes pulse-alarm-box {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(231, 76, 60, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 80px rgba(231, 76, 60, 0.6); }
        }
        .alarm-box .alarm-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 10px;
        }
        .alarm-box .alarm-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--red);
            margin-bottom: 8px;
        }
        .alarm-box .alarm-text {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 20px;
            word-break: break-word;
        }
        .alarm-box .alarm-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .alarm-box .alarm-actions .btn {
            min-width: 120px;
            padding: 14px 20px;
            font-size: 16px;
        }

        /* ===== ZADACI ===== */
        .tasks { flex: 1; overflow: auto; padding-right: 2px; }

        .task {
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 6px solid var(--blue);
            border-right: 6px solid var(--blue);
            border-radius: 16px;
            padding: 12px 12px 11px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
            animation: taskIn 0.4s ease;
            color: var(--text);
        }
        .task:hover {
            transform: translateX(4px);
            border-color: var(--border-hover);
        }

        @keyframes taskIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task.alarm {
            border-left-color: var(--yellow);
            border-right-color: var(--yellow);
            box-shadow: 0 0 0 1px rgba(241,196,15,0.25), 0 0 22px rgba(241,196,15,0.25);
            animation: pulse 1.6s infinite;
        }

        .task.done {
            opacity: 0.55;
            border-left-color: #7f8c8d !important;
            border-right-color: #7f8c8d !important;
            animation: none !important;
        }
        .task.done .task-text {
            text-decoration: line-through;
        }

        .task.shared-task {
            border-left-color: var(--teal) !important;
            border-right-color: var(--teal) !important;
        }

        .task.blink-shared {
            animation: blink-glow 1.5s infinite ease-in-out;
            border-top: 1px solid rgba(26, 188, 156, 0.6);
            border-bottom: 1px solid rgba(26, 188, 156, 0.6);
        }

        .task.deleted {
            opacity: 0.4;
            border-left-color: var(--orange) !important;
            border-right-color: var(--orange) !important;
        }
        .task.deleted .task-text {
            opacity: 0.6;
        }

        /* ===== PODZADACI ===== */
        .subtasks {
            margin: 8px 0 10px 16px;
            padding-left: 8px;
            border-left: 2px solid var(--border);
        }
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .subtask-item input[type="checkbox"] {
            accent-color: var(--blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .subtask-item.done {
            opacity: 0.5;
            text-decoration: line-through;
        }
        .subtask-item .subtask-text {
            flex: 1;
            word-break: break-word;
        }
        .subtask-item .subtask-delete {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            transition: var(--transition);
        }
        .subtask-item .subtask-delete:hover { opacity: 1; }
        .subtask-add {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .subtask-add input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text);
            outline: none;
            transition: var(--transition);
        }
        .subtask-add input:focus { border-color: var(--blue); }
        .subtask-add button {
            background: var(--blue);
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }
        .subtask-add button:hover { transform: scale(1.05); }
        .subtask-progress {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .subtask-progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .subtask-progress-bar .fill {
            height: 100%;
            background: var(--green);
            transition: var(--transition);
            border-radius: 4px;
        }

        /* ===== ANIMACIJE ===== */
        @keyframes pulse {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 18px rgba(241,196,15,0.20); }
            50% { transform: translateY(-2px); box-shadow: 0 0 28px rgba(241,196,15,0.38); }
        }

        @keyframes blink-glow {
            0%, 100% { box-shadow: 0 10px 20px rgba(0,0,0,0.26); background: var(--panel); }
            50% { box-shadow: 0 0 20px rgba(26,188,156,0.6); background: var(--bg-secondary); }
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100px); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== TASK DELOVI ===== */
        .task-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .task-text {
            white-space: pre-wrap;
            line-height: 1.45;
            font-size: 15px;
            margin-bottom: 10px;
            transition: var(--transition);
            color: var(--text);
        }
        .task-meta {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .alarm-banner {
            background: var(--yellow);
            color: #000;
            font-weight: 900;
            border-radius: 10px;
            padding: 6px 10px;
            margin-bottom: 8px;
            text-align: center;
            font-size: 13px;
            animation: fadeIn 0.5s ease;
        }
        .shared-badge {
            display: inline-block;
            background: rgba(26, 188, 156, 0.2);
            color: #1abc9c;
            border: 1px solid rgba(26, 188, 156, 0.4);
            border-radius: 8px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .shared-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(26, 188, 156, 0.3);
        }
        .shared-header-icon { font-size: 22px; }
        .shared-header-text { font-size: 15px; font-weight: 800; color: #1abc9c; }
        .shared-header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* ===== ALARM U ZADATKU ===== */
        .task-alarm-check {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 8px 0 10px 0;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .task-alarm-check label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .task-alarm-check label:hover {
            color: var(--text);
        }
        .task-alarm-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--orange);
            flex-shrink: 0;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid var(--border);
            padding-top: 9px;
            flex-wrap: wrap;
        }
        .iconbtn {
            width: 36px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            transition: var(--transition);
        }
        .iconbtn:hover { transform: scale(1.1); }
        .iconbtn:active { transform: scale(0.9); }

        /* ===== LOGIN ===== */
        #loginOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: var(--panel);

        /* ===== TOAST ===== */
        #toastContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;

        .toast {
            padding: 12px 20px;

        .toast-error { background: var(--red); }
        .toast-warning { background: #f39c12; }

        /* ===== PAGINACIJA ===== */

            display: flex;

        /* ===== RESPONSIVE ===== */

<body>

    <script>
        // ============================================================
        //  FIREBASE KONFIGURACIJA
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCugHbVWFgvyokk9bx8xMSaUf-P9X3WGM4",
            authDomain: "mojplaner-fa083.firebaseapp.com",
            databaseURL: "https://mojplaner-fa083-default-rtdb.firebaseio.com",
            projectId: "mojplaner-fa083",
            storageBucket: "mojplaner-fa083.firebasestorage.app",
            messagingSenderId: "497880664790",
            appId: "1:497880664790:web:b5ee81a413f55ac79e1777"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================================
        //  TEMA
        // ============================================================
        function getStoredTheme() {
            return localStorage.getItem('mp_theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('mp_theme', theme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.textContent = theme === 'dark' ? '🌙' : '☀️';
            }
        }

        window.toggleTheme = function() {
            const current = getStoredTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        };

        setTheme(getStoredTheme());

        // ============================================================
        //  ZVUČNI ALARM
        // ============================================================
        let alarmTimeout = null;
        let isAlarmPlaying = false;
        let currentAlarmTaskKey = null;

        function playAlarmSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'square';
                osc1.frequency.value = 800;
                gain1.gain.value = 0.3;
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                
                setTimeout(function() {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'square';
                    osc2.frequency.value = 1000;
                    gain2.gain.value = 0.3;
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    setTimeout(function() {
                        osc2.stop();
                    }, 200);
                }, 200);
                
                setTimeout(function() {
                    osc1.stop();
                }, 400);
                
                if (isAlarmPlaying) {
                    alarmTimeout = setTimeout(function() {
                        playAlarmSound();
                    }, 800);
                }
            } catch (e) {
                console.log('Zvuk nije podržan:', e);
            }
        }

        function showAlarm(taskKey, taskText) {
            currentAlarmTaskKey = taskKey;
            isAlarmPlaying = true;
            
            document.getElementById('alarmText').textContent = taskText || 'Zadatak!';
            document.getElementById('alarmOverlay').classList.add('active');
            
            playAlarmSound();
            
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }
        }

        window.stopAlarm = function() {
            isAlarmPlaying = false;
            if (alarmTimeout) {
                clearTimeout(alarmTimeout);
                alarmTimeout = null;
            }
            document.getElementById('alarmOverlay').classList.remove('active');
            currentAlarmTaskKey = null;
        };

        window.snoozeAlarm = function() {
            isAlarmPlaying = false;
            if (alarmTimeout) {
                clearTimeout(alarmTimeout);
                alarmTimeout = null;
            }
            document.getElementById('alarmOverlay').classList.remove('active');
            
            showToast('😴 Alarm odložen na 5 minuta', 'warning', 3000);
            setTimeout(function() {
                if (currentAlarmTaskKey && allTasks[currentAlarmTaskKey]) {
                    const task = allTasks[currentAlarmTaskKey];
                    if (task && !task.completed && task.alarm !== false) {
                        showAlarm(currentAlarmTaskKey, task.text);
                    }
                }
            }, 300000);
        };

        window.testAlarm = function() {
            showAlarm('test', '🧪 Test zvučnog alarma!');
            setTimeout(function() {
                stopAlarm();
            }, 5000);
        };

        function checkAlarms() {
            const now = new Date();
            
            Object.keys(allTasks).forEach(function(key) {
                const task = allTasks[key];
                if (!task || task.completed || task.deleted) return;
                if (!task.time) return;
                if (task.alarm === false) return;
                
                const taskTime = new Date(task.time);
                if (isNaN(taskTime.getTime())) return;
                
                const diff = taskTime.getTime() - now.getTime();
                if (diff > -60000 && diff < 60000 && !task._alarmed) {
                    allTasks[key]._alarmed = true;
                    showAlarm(key, task.text);
                }
            });
        }

        setInterval(function() {
            checkAlarms();
        }, 10000);

        // ============================================================
        //  POMOĆNE FUNKCIJE (UTILS)
        // ============================================================
        function escapeHtml(s) {
            if (!s) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
                '`': '&#096;',
                '/': '&#047;'
            };
            return String(s).replace(/[&<>"'`/]/g, function(m) {
                return map[m] || m;
            });
        }

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function dateToISO(d) {
            if (!d) return '';
            const date = d instanceof Date ? d : new Date(d);
            if (isNaN(date.getTime())) return '';
            return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + 
                   pad(date.getDate()) + 'T' + pad(date.getHours()) + ':' + pad(date.getMinutes());
        }

        function displayDate(iso) {
            if (!iso) return 'Bez vremena';
            const parts = iso.split('T');
            if (parts.length < 2) return iso;
            const dateParts = parts[0].split('-');
            const time = parts[1] || '';
            return dateParts[2] + '-' + dateParts[1] + '-' + dateParts[0] + 
                   (time ? ' ' + time.slice(0, 5) : '');
        }

        function isValidDateTime(value) {
            if (!value) return true;
            const date = new Date(value);
            return date instanceof Date && !isNaN(date);
        }

        function validateTaskInput(text, time, category) {
            const errors = [];
            if (!text || text.trim().length === 0) {
                errors.push('Unesite tekst zadatka');
            }
            if (text && text.length > 500) {
                errors.push('Tekst zadatka je predugačak (maks. 500 karaktera)');
            }
            if (time && !isValidDateTime(time)) {
                errors.push('Neispravan format datuma/vremena');
            }
            if (!category || category === 'Sve') {
                errors.push('Izaberite kategoriju');
            }
            return errors;
        }

        function calculateNextDate(dateStr, repeatType) {
            if (!dateStr || !repeatType || repeatType === 'none') return '';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '';
            
            switch (repeatType) {
                case 'daily':
                    date.setDate(date.getDate() + 1);
                    break;
                case 'weekly':
                    date.setDate(date.getDate() + 7);
                    break;
                case 'monthly':
                    date.setMonth(date.getMonth() + 1);
                    break;
                case 'yearly':
                    date.setFullYear(date.getFullYear() + 1);
                    break;
                case 'weekdays':
                    do {
                        date.setDate(date.getDate() + 1);
                    } while ([0, 6].includes(date.getDay()));
                    break;
                default:
                    return '';
            }
            return dateToISO(date);
        }

        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(function() {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, duration);
        }

        function emailToKey(email) {
            if (!email) return '';
            return email.toLowerCase().replace(/\./g, '_').replace(/@/g, '__');
        }

        function getDbRef(userId) {
            if (!userId) return null;
            return database.ref('users/' + userId + '/tasks');
        }

        function generateId() {
            return Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
        }

        // ============================================================
        //  OFFLINE QUEUE
        // ============================================================
        const QUEUE_KEY = 'mp_queue';
        let offlineQueue = [];

        function loadQueue() {
            try {
                const data = localStorage.getItem(QUEUE_KEY);
                offlineQueue = data ? JSON.parse(data) : [];
            } catch (e) {
                offlineQueue = [];
            }
        }

        function saveQueue() {
            try {
                localStorage.setItem(QUEUE_KEY, JSON.stringify(offlineQueue));
            } catch (e) {}
        }

        function addToQueue(operation) {
            offlineQueue.push({
                ...operation,
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                timestamp: new Date().toISOString()
            });
            saveQueue();
            showToast('Operacija sačuvana za offline sinhronizaciju.', 'info', 2000);
        }

        async function flushQueue() {
            if (!navigator.onLine || offlineQueue.length === 0) return;
            if (!currentUser) return;
            
            const operations = [...offlineQueue];
            offlineQueue = [];
            saveQueue();
            
            const dbRef = getDbRef(currentUser.uid);
            
            for (const op of operations) {
                try {
                    switch (op.type) {
                        case 'push':
                            await dbRef.push(op.payload);
                            break;
                        case 'update':
                            await dbRef.child(op.key).update(op.payload);
                            break;
                        case 'remove':
                            await dbRef.child(op.key).remove();
                            break;
                        case 'removeall':
                            await dbRef.remove();
                            break;
                        default:
                            console.warn('Nepoznata operacija:', op.type);
                    }
                } catch (error) {
                    console.error('Queue flush error:', error);
                    offlineQueue.unshift(op);
                    saveQueue();
                    break;
                }
            }
            
            if (offlineQueue.length === 0) {
                showToast('Sve offline operacije su sinhronizovane!', 'success', 2000);
            }

        function checkAndNotify() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            
            const now = new Date();
            
            const catEmoji = {
                'Kola': '🚗', 'Zdravlje': '💊', 'Kupovina': '🛒',
                'Hobi': '🎨', 'Dom': '🏠', 'Posao': '💼', 'Razno': '📌'
            };
            
            Object.keys(allTasks).forEach(function(key) {
                const task = allTasks[key];
                if (!task || task.completed || task.deleted) {
                    notifiedTasks.delete(key);
                    notifiedTasks.delete(key + '_s');
                    notifiedTasks.delete(key + '_2d');
                    return;
                }
                
                if (!task.time) return;
                const taskTime = new Date(task.time);
                if (isNaN(taskTime.getTime())) return;
                
                const emoji = catEmoji[task.category] || '📌';
                const timeDiff = taskTime.getTime() - now.getTime();
                const hoursDiff = timeDiff / (1000 * 60 * 60);
                
                if (!notifiedTasks.has(key) && taskTime <= now) {
                    notifiedTasks.add(key);
                    showPushNotification(
                        '⏰ VREME JE!',
                        emoji + ' ' + task.text,
                        'alarm_' + key
                    );
                }
                
                if (!notifiedTasks.has(key + '_s') && hoursDiff > 1 && hoursDiff <= 24) {
                    notifiedTasks.add(key + '_s');
                    showPushNotification(
                        '📅 Sutra vas čeka zadatak',
                        emoji + ' ' + task.text + ' - ' + displayDate(task.time),
                        'sutra_' + key
                    );
                }
                
                if (!notifiedTasks.has(key + '_2d') && hoursDiff > 24 && hoursDiff <= 48) {
                    notifiedTasks.add(key + '_2d');
                    showPushNotification(
                        '📅 Za 2 dana vas čeka zadatak',
                        emoji + ' ' + task.text + ' - ' + displayDate(task.time),
                        'dva_dana_' + key
                    );
                }
            });
        }

                requireInteraction: true
            };
            
            if ('serviceWorker' in navigator) {

                    await reg.showNotification(title, opts);
                    return;

                    console.log('SW notifikacija:', e);

            try {
                new Notification(title, opts);

        function renderCalendar(id, offset) {
            const el = document.getElementById(id);
            if (!el) return;
            
            if (calendarView === 'week') {
                renderWeekView(el, offset);
                return;
            }
            
            const d = new Date();
            d.setMonth(d.getMonth() + offset);
            const year = d.getFullYear();
            const month = d.getMonth();
            
            const first = new Date(year, month, 1).getDay();
            const start = first === 0 ? 6 : first - 1;
            
            const today = new Date().toISOString().split('T')[0];
            
            let html = '<div class="cal-head">';
            html += '<button class="cal-nav" onclick="changeMonth(-1, \'' + id + '\')">◀</button>';
            html += '<span>' + months[month] + ' ' + year + '</span>';
            html += '<button class="cal-nav" onclick="changeMonth(1, \'' + id + '\')">▶</button>';
            html += '</div>';
            
            html += '<div class="cal-view-toggle" style="margin-bottom:8px;">';
            html += '<button class="' + (calendarView === 'month' ? 'active' : '') + '" onclick="setCalendarView(\'month\', \'' + id + '\')">📅 Mesec</button>';
            html += '<button class="' + (calendarView === 'week' ? 'active' : '') + '" onclick="setCalendarView(\'week\', \'' + id + '\')">📆 Nedelja</button>';
            html += '</div>';
            
            html += '<div class="cal-grid">';
            
            days.forEach(function(day) {
                html += '<div class="dayname">' + day + '</div>';
            });
            
            for (let i = 0; i < start; i++) {
                html += '<div></div>';
            }
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = year + '-' + pad(month + 1) + '-' + pad(i);
                const hasTask = Object.values(allTasks).some(function(task) {
                    return task.time && task.time.startsWith(dateStr) && !task.completed && !task.deleted;
                });
                const isToday = today === dateStr;
                const isSelected = filterDate === dateStr;
                
                html += '<div class="day' + (isToday ? ' today' : '') + (isSelected ? ' sel' : '') + '" onclick="filterByDate(\'' + dateStr + '\')">' + i + (hasTask ? '<div class="dot"></div>' : '') + '</div>';
            }
            
            html += '</div>';
            el.innerHTML = html;
        }

        function renderWeekView(el, offset) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            const dayOfWeek = today.getDay();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            startOfWeek.setDate(startOfWeek.getDate() + (weekOffset * 7));
            startOfWeek.setHours(0, 0, 0, 0);
            
            let html = '<div class="cal-head">';
            html += '<button class="cal-nav" onclick="changeWeek(-1, \'' + el.id + '\')">◀</button>';
            html += '<span>Nedelja ' + getWeekNumber(startOfWeek) + ' (' + formatDateRange(startOfWeek) + ')</span>';
            html += '<button class="cal-nav" onclick="changeWeek(1, \'' + el.id + '\')">▶</button>';
            html += '</div>';
            
            html += '<div class="cal-view-toggle" style="margin-bottom:8px;">';
            html += '<button class="' + (calendarView === 'month' ? 'active' : '') + '" onclick="setCalendarView(\'month\', \'' + el.id + '\')">📅 Mesec</button>';
            html += '<button class="' + (calendarView === 'week' ? 'active' : '') + '" onclick="setCalendarView(\'week\', \'' + el.id + '\')">📆 Nedelja</button>';
            html += '</div>';
            
            html += '<div class="week-grid">';
            
            const todayStr = today.toISOString().split('T')[0];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                date.setHours(0, 0, 0, 0);
                
                const dateStr = date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
                const dayNum = date.getDate();
                const isToday = todayStr === dateStr;
                const monthName = months[date.getMonth()];
                
                const dayTasks = Object.values(allTasks).filter(function(task) {
                    if (!task.time || task.deleted) return false;
                    const taskDate = task.time.split('T')[0];
                    return taskDate === dateStr;
                });
                
                html += '<div class="week-day' + (isToday ? ' today' : '') + '" onclick="filterByDate(\'' + dateStr + '\')">';
                html += '<span class="day-number">' + dayNum + '</span>';
                html += '<span style="font-size:9px;color:var(--muted);display:block;">' + monthName + '</span>';
                
                const displayTasks = dayTasks.slice(0, 3);
                displayTasks.forEach(function(task) {
                    const isAlarm = task.time && !task.completed && new Date(task.time) <= new Date();
                    const isDone = task.completed;
                    html += '<div class="week-task' + (isDone ? ' done-task' : '') + (isAlarm ? ' alarm-task' : '') + '">' + 
                            escapeHtml(task.text.substring(0, 12)) + (task.text.length > 12 ? '…' : '') + '</div>';
                });
                
                if (dayTasks.length > 3) {
                    html += '<div style="font-size:8px;color:var(--muted);">+' + (dayTasks.length - 3) + ' još</div>';
                }
                
                html += '</div>';
            }
            
            html += '</div>';
            el.innerHTML = html;
        }

        function getWeekNumber(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
            const week1 = new Date(d.getFullYear(), 0, 4);
            return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        function formatDateRange(startDate) {
            const end = new Date(startDate);
            end.setDate(startDate.getDate() + 6);
            return startDate.getDate() + '.' + (startDate.getMonth() + 1) + '. - ' + 
                   end.getDate() + '.' + (end.getMonth() + 1) + '.';
        }

        // ===== PROVERA SMEĆA (30 dana) =====
        function checkTrashExpiry() {
            const now = Date.now();
            const thirtyDays = 30 * 24 * 60 * 60 * 1000;
            let deletedCount = 0;
            
            Object.keys(allTasks).forEach(function(key) {
                const task = allTasks[key];
                if (task.deleted && task.deletedAt) {
                    const deletedTime = new Date(task.deletedAt).getTime();
                    if (now - deletedTime > thirtyDays) {
                        if (currentUser) {
                            const db = getDbRef(currentUser.uid);
                            if (db && navigator.onLine) {
                                db.child(key).remove();
                            } else if (db) {
                                addToQueue({ type: 'remove', key: key });
                            }
                        }
                        delete allTasks[key];
                        deletedCount++;
                    }
                }
            });
            
            if (deletedCount > 0) {
                showToast('🗑️ ' + deletedCount + ' zadatak(a) trajno obrisan iz smeća (30 dana)', 'info', 3000);
                renderTasks();
            }
        }

        // ===== SINHRONIZACIJA DELJENIH (POPRAVLJENA) =====
        function syncSharedTaskToLocal(sharedKey, sharedData) {
            let found = false;
            
            Object.keys(allTasks).forEach(function(key) {
                if (allTasks[key] && allTasks[key].sharedKey === sharedKey) {
                    found = true;
                    if (sharedData) {
                        allTasks[key].text = sharedData.text || allTasks[key].text;
                        allTasks[key].time = sharedData.time || allTasks[key].time;
                        allTasks[key].category = sharedData.category || allTasks[key].category;
                        allTasks[key].repeat = sharedData.repeat || allTasks[key].repeat;
                        allTasks[key].completed = sharedData.completed !== undefined ? sharedData.completed : allTasks[key].completed;
                        allTasks[key].completedAt = sharedData.completedAt || '';
                        allTasks[key].deleted = sharedData.deleted !== undefined ? sharedData.deleted : allTasks[key].deleted;
                        allTasks[key].deletedAt = sharedData.deletedAt || '';
                        allTasks[key].subtasks = sharedData.subtasks || allTasks[key].subtasks || {};
                        allTasks[key].alarm = sharedData.alarm !== undefined ? sharedData.alarm : allTasks[key].alarm;
                    } else {
                        delete allTasks[key];
                    }
                }
            });
            
            if (!found && sharedData && currentUser) {
                const newKey = generateId();
                allTasks[newKey] = {
                    text: sharedData.text || 'Deljeni zadatak',
                    time: sharedData.time || '',
                    category: sharedData.category || 'Razno',
                    repeat: sharedData.repeat || 'none',
                    completed: sharedData.completed || false,
                    completedAt: sharedData.completedAt || '',
                    deleted: sharedData.deleted || false,
                    deletedAt: sharedData.deletedAt || '',
                    createdAt: sharedData.createdAt || dateToISO(new Date()),

            });
            
            const extraStyle = hasUnreadShared ? 'style="animation: blink-glow 1.5s infinite ease-in-out; border: 1px solid var(--teal);"' : '';
            
            html += '<button class="chip teal-chip' + (isShared ? ' active-teal' : '') + '" ' + extraStyle + ' onclick="setCat(\'Deljeni\')">🤝 Deljeni' + (sharedCount > 0 ? ' (' + sharedCount + ')' : '') + '</button>';
            
            container.innerHTML = html;
            
            const catSelect = document.getElementById('taskCat');
            if (catSelect) {
                catSelect.innerHTML = categories.filter(function(c) { return c !== 'Sve'; }).map(function(c) {
                    return '<option value="' + c + '">' + (catEmoji[c] || '📌') + ' ' + c + '</option>';
                }).join('');
            }
        }

        function renderTaskList() {
            const list = document.getElementById('taskList');
            if (!list) return;
            
            const now = new Date();
            
            list.innerHTML = '';
            
            if (filterCategory === 'Deljeni') {
                renderSharedTasks(list, now);
                return;
            }
            
            if (showTrash) {
                renderTrashTasks(list);
                return;
            }
            
            if (showDone) {
                renderDoneTasks(list);
                return;
            }
            
            const keys = getFilteredTasks();
            renderActiveTasks(list, keys, now);
            
            checkAndNotify();
        }

        function getFilteredTasks() {
            const search = (document.getElementById('quickSearch').value || '').trim().toLowerCase();
            return Object.keys(allTasks).filter(function(key) {
                const task = allTasks[key];
                if (!task) return false;
                if (task.deleted) return false;
                if (task.completed) return false;
                if (filterCategory !== 'Sve' && task.category !== filterCategory) return false;
                if (filterDate && !(task.time && task.time.startsWith(filterDate))) return false;
                if (search && !(String(task.text).toLowerCase().includes(search) || 
                               String(task.category).toLowerCase().includes(search))) return false;
                return true;
            });
        }

        function renderDoneTasks(list) {
            const done = Object.keys(allTasks).filter(function(key) {
                const task = allTasks[key];
                return task && task.completed && !task.deleted;
            }).sort(function(a, b) {
                return (allTasks[b].completedAt || '').localeCompare(allTasks[a].completedAt || '');
            });
            
            if (!done.length) {
                list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;">📁 Nema završenih zadataka.</div>';
                return;
            }
            
            let html = '<div style="margin-bottom:12px;text-align:center;color:var(--muted);font-size:13px;">📁 Završeni zadaci (' + done.length + ')</div>';
            
            done.forEach(function(key) {
                const task = allTasks[key];
                const emoji = catEmoji[task.category] || '📌';
                const isShared = task.sharedKey ? true : false;
                
                html += '<div class="task done ' + (isShared ? 'shared-task' : '') + ' cat-' + task.category + '">' +
                    '<div class="task-head"><div>' + emoji + ' ' + (task.category || 'Razno') + (isShared ? ' 🤝' : '') + '</div><div>' + (task.time ? displayDate(task.time) : 'Bez vremena') + '</div></div>' +
                    (task.completedAt ? '<div class="task-meta">Završeno: ' + displayDate(task.completedAt) + '</div>' : '') +
                    (task.sharedWith ? '<div style="font-size:11px;color:#1abc9c;margin-bottom:6px;">📤 Deljeno sa: ' + escapeHtml(task.sharedWith) + '</div>' : '') +
                    '<div class="task-text">' + escapeHtml(task.text) + '</div>' +
                    renderSubtasksHTML(task.subtasks, key, false) +
                    renderAlarmCheckbox(key, task) +
                    '<div class="actions">' +
                    '<button class="iconbtn" style="background:#2ecc71" onclick="restoreFromDone(\'' + key + '\')" title="Vrati kao nezavršen">↩</button>' +
                    '<button class="iconbtn" style="background:#e67e22" onclick="moveToTrash(\'' + key + '\')" title="Pošalji u smeće">🗑️</button>' +
                    '</div></div>';
            });
            
            list.innerHTML = html;
        }

        function renderTrashTasks(list) {
            const trashed = Object.keys(allTasks).filter(function(key) {
                return allTasks[key]?.deleted;
            }).sort(function(a, b) {
                return (allTasks[b].deletedAt || '').localeCompare(allTasks[a].deletedAt || '');
            });
            
            if (!trashed.length) {
                list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;">🗑️ Smeće je prazno.</div>';
                return;
            }
            
            const now = Date.now();
            
            let html = '<div style="margin-bottom:12px;text-align:center;color:var(--muted);font-size:13px;">🗑️ Smeće (' + trashed.length + ') - zadaci se automatski brišu nakon 30 dana</div>';
            
            trashed.forEach(function(key) {
                const task = allTasks[key];
                const emoji = catEmoji[task.category] || '📌';
                const daysLeft = Math.max(0, 30 - Math.floor((now - new Date(task.deletedAt).getTime()) / (24 * 60 * 60 * 1000)));
                const isShared = task.sharedKey ? true : false;
                
                html += '<div class="task deleted ' + (isShared ? 'shared-task' : '') + ' cat-' + task.category + '">' +
                    '<div class="task-head"><div>' + emoji + ' ' + (task.category || 'Razno') + (isShared ? ' 🤝' : '') + '</div><div>' + (task.time ? displayDate(task.time) : 'Bez vremena') + '</div></div>' +
                    (task.deletedAt ? '<div class="task-meta">🗑️ U smeću: ' + displayDate(task.deletedAt) + ' (još ' + daysLeft + ' dana)</div>' : '') +
                    (task.sharedWith ? '<div style="font-size:11px;color:#1abc9c;margin-bottom:6px;">📤 Deljeno sa: ' + escapeHtml(task.sharedWith) + '</div>' : '') +
                    '<div class="task-text">' + escapeHtml(task.text) + '</div>' +
                    renderSubtasksHTML(task.subtasks, key, false) +
                    renderAlarmCheckbox(key, task) +
                    '<div class="actions">' +
                    '<button class="iconbtn" style="background:#2ecc71" onclick="restoreFromTrash(\'' + key + '\')" title="Vrati kao aktivan">↩</button>' +
                    '<button class="iconbtn" style="background:#e74c3c" onclick="deleteTaskPermanently(\'' + key + '\')" title="Obriši trajno">🗑️</button>' +
                    '</div></div>';
            });
            
            list.innerHTML = html;
        }

        function renderSharedTasks(list, now) {
            const keys = Object.keys(sharedTasksData);
            
            if (!keys.length) {
                list.innerHTML = '<div class="shared-header"><div class="shared-header-icon">🤝</div><div><div class="shared-header-text">Deljeni zadaci</div><div class="shared-header-sub">Izmene su vidljive svim učesnicima odmah</div></div></div><div style="text-align:center;color:var(--muted);padding:30px;">Nemate deljenih zadataka.<br><br>Koristite dugme 📤 na zadatku da ga podelite.</div>';
                return;
            }
            
            const lastViewedShared = parseInt(localStorage.getItem('mp_last_viewed_shared') || '0');
            
            let html = '<div class="shared-header"><div class="shared-header-icon">🤝</div><div><div class="shared-header-text">Deljeni zadaci</div><div class="shared-header-sub">Izmene su vidljive svim učesnicima odmah</div></div></div>';
            
            keys.forEach(function(key) {
                const task = sharedTasksData[key];
                if (!task) return;
                
                const emoji = catEmoji[task.category] || '📌';
                const isAlarm = task.time && !task.completed && new Date(task.time) <= now;
                const parts = task.participants ? Object.values(task.participants).join(', ') : '';
                const creatorDisplay = task.createdByNickname ? 
                    task.createdByNickname + ' (' + task.createdByEmail + ')' : 
                    task.createdByEmail;
                
                const shouldBlink = task.lastChangedAt && 
                                   task.lastChangedBy !== currentUser?.uid && 
                                   new Date(task.lastChangedAt).getTime() > lastViewedShared;
                
                html += '<div class="task shared-task cat-' + task.category + (task.completed ? ' done' : '') + (isAlarm ? ' alarm' : '') + (shouldBlink ? ' blink-shared' : '') + '">' +
                    (isAlarm ? '<div class="alarm-banner">⏰ VREME JE — ' + displayDate(task.time) + '</div>' : '') +
                    '<div class="task-head"><div>' + emoji + ' ' + task.category + '</div><div>' + (task.time ? displayDate(task.time) : 'Bez vremena') + '</div></div>' +
                    '<div style="font-size:11px;color:#1abc9c;margin-bottom:6px;">🤝 Učesnici: ' + escapeHtml(parts) + '</div>' +
                    (task.createdByEmail ? '<div class="task-meta">Kreirao/la: ' + escapeHtml(creatorDisplay) + '</div>' : '') +
                    '<div class="task-text">' + escapeHtml(task.text) + '</div>' +
                    renderSubtasksHTML(task.subtasks, key, true) +
                    renderAlarmCheckbox(key, task) +
                    '<div class="actions">' +
                    '<button class="iconbtn" style="background:#2ecc71" onclick="toggleSharedComplete(\'' + key + '\')" title="' + (task.completed ? 'Vrati' : 'Završi') + '">✓</button>' +
                    '<button class="iconbtn" style="background:#3498db" onclick="editSharedTask(\'' + key + '\')" title="Izmeni">✏️</button>' +
                    '<button class="iconbtn" style="background:#e74c3c" onclick="removeSharedRef(\'' + key + '\')" title="Ukloni">✕</button>' +
                    '</div></div>';
            });
            
            list.innerHTML = html;
        }

        function renderActiveTasks(list, keys, now) {
            const active = keys.filter(function(k) { return !allTasks[k]?.completed; })
                .sort(function(a, b) {
                    const aAlarm = allTasks[a]?.time && new Date(allTasks[a].time) <= now;
                    const bAlarm = allTasks[b]?.time && new Date(allTasks[b].time) <= now;
                    if (aAlarm !== bAlarm) return aAlarm ? -1 : 1;
                    return sortByTime(a, b);
                });
            
            if (!active.length) {
                list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;">Nema aktivnih zadataka.</div>';
                return;
            }
            
            let html = '';
            active.forEach(function(key) {
                const task = allTasks[key];
                if (!task) return;
                
                const isAlarm = task.time && !task.completed && new Date(task.time) <= now;
                const emoji = catEmoji[task.category] || '📌';
                const repeatInfo = task.repeat && task.repeat !== 'none' ? ' ♻️' : '';
                const isShared = task.sharedKey ? true : false;
                
                html += '<div class="task ' + (isShared ? 'shared-task' : '') + ' cat-' + task.category + (isAlarm ? ' alarm' : '') + '">' +
                    (isAlarm ? '<div class="alarm-banner">⏰ VREME JE — ' + displayDate(task.time) + '</div>' : '') +
                    '<div class="task-head"><div>' + emoji + ' ' + (task.category || 'Razno') + repeatInfo + (isShared ? ' 🤝' : '') + '</div><div>' + (task.time ? displayDate(task.time) : 'Bez vremena') + '</div></div>' +
                    (task.createdAt ? '<div class="task-meta">Postavljeno: ' + displayDate(task.createdAt) + '</div>' : '') +
                    (task.sharedWith ? '<div style="font-size:11px;color:#1abc9c;margin-bottom:6px;">📤 Deljeno sa: ' + escapeHtml(task.sharedWith) + '</div>' : '') +
                    '<div class="task-text">' + escapeHtml(task.text) + '</div>' +
                    renderSubtasksHTML(task.subtasks, key, false) +
                    renderAlarmCheckbox(key, task) +
                    '<div class="actions">' +
                    '<button class="iconbtn" style="background:#2ecc71" onclick="toggleComplete(\'' + key + '\')" title="Završi">✓</button>' +
                    '<button class="iconbtn" style="background:#3498db" onclick="prepareEdit(\'' + key + '\')" title="Izmeni">✏️</button>' +
                    (isShared ? '' : '<button class="iconbtn" style="background:#1abc9c" onclick="shareTask(\'' + key + '\')" title="Podeli">📤</button>') +
                    '<button class="iconbtn" style="background:#e67e22" onclick="moveToTrash(\'' + key + '\')" title="Pošalji u smeće">🗑️</button>' +
                    '</div></div>';
            });
            
            list.innerHTML = html;
        }

        // ===== ALARM U ZADATKU =====
        function renderAlarmCheckbox(key, task) {
            const isAlarmOn = task.alarm !== false;
            
            return '<div class="task-alarm-check">' +
                '<label>' +
                    '<input type="checkbox" class="alarm-check" ' + (isAlarmOn ? 'checked' : '') + 
                    ' onchange="toggleAlarm(\'' + key + '\', this.checked)" />' +
                    ' 🔔 Zvučni alarm' +
                '</label>' +
            '</div>';
        }

        // ===== TOGGLE ALARMA =====
        window.toggleAlarm = function(key, checked) {
            if (!currentUser) return;
            
            const db = getDbRef(currentUser.uid);
            const nowISO = dateToISO(new Date());
            const updates = { alarm: checked };
            
            const task = allTasks[key];
            if (task && task.sharedKey) {
                database.ref('sharedTasks/' + task.sharedKey).update({
                    alarm: checked,
                    lastChangedAt: nowISO,
                    lastChangedBy: currentUser.uid
                });
            }
            
            if (navigator.onLine) {
                db.child(key).update(updates);
            } else {
                addToQueue({ type: 'update', key: key, payload: updates });
            }
            
            showToast(checked ? '🔔 Alarm uključen' : '🔕 Alarm isključen', 'info', 1500);
        };

        // ===== PODZADACI (HTML render) =====
        function renderSubtasksHTML(subtasks, taskKey, isShared) {
            if (!subtasks || Object.keys(subtasks).length === 0) {
                return '<div class="subtasks"><div class="subtask-add">' +
                    '<input type="text" placeholder="Dodaj podzadatak..." id="subtaskInput_' + taskKey + '" onkeydown="if(event.key===\'Enter\')addSubtask(this, \'' + taskKey + '\', ' + isShared + ')" />' +
                    '<button onclick="addSubtask(document.getElementById(\'subtaskInput_' + taskKey + '\'), \'' + taskKey + '\', ' + isShared + ')">+</button>' +
                    '</div></div>';
            }
            
            const list = Object.values(subtasks);
            const total = list.length;
            const done = list.filter(s => s.completed).length;
            const progress = total > 0 ? (done / total * 100) : 0;
            
            let html = '<div class="subtasks">';
            html += '<div class="subtask-progress">📋 Podzadaci: ' + done + '/' + total + ' završeno</div>';
            html += '<div class="subtask-progress-bar"><div class="fill" style="width:' + progress + '%;"></div></div>';
            
            Object.keys(subtasks).forEach(function(subId) {
                const sub = subtasks[subId];
                html += '<div class="subtask-item' + (sub.completed ? ' done' : '') + '">' +
                    '<input type="checkbox" ' + (sub.completed ? 'checked' : '') + ' onchange="toggleSubtask(\'' + taskKey + '\', \'' + subId + '\', ' + isShared + ')" />' +
                    '<span class="subtask-text">' + escapeHtml(sub.text) + '</span>' +
                    '<button class="subtask-delete" onclick="deleteSubtask(\'' + taskKey + '\', \'' + subId + '\', ' + isShared + ')">✕</button>' +
                    '</div>';
            });
            
            html += '<div class="subtask-add">' +
                '<input type="text" placeholder="Dodaj podzadatak..." id="subtaskInput_' + taskKey + '" onkeydown="if(event.key===\'Enter\')addSubtask(this, \'' + taskKey + '\', ' + isShared + ')" />' +
                '<button onclick="addSubtask(document.getElementById(\'subtaskInput_' + taskKey + '\'), \'' + taskKey + '\', ' + isShared + ')">+</button>' +
                '</div>';
            html += '</div>';
            
            return html;
        }

        // ===== PODZADACI (funkcije) =====
        window.addSubtask = function(input, taskKey, isShared) {
            if (!currentUser) {
                showToast('Niste prijavljeni.', 'error');
                return;
            }
            
            const text = input.value.trim();
            if (!text) {
                showToast('Unesite tekst podzadatka.', 'warning');
                return;
            }
            
            if (!taskKey) {
                showToast('Prvo sačuvajte zadatak pa dodajte podzadatke.', 'warning');
                return;
            }
            
            const subtaskId = generateId();
            const nowISO = dateToISO(new Date());
            
            if (isShared) {
                // Ažuriraj sharedTasks direktno (NE kreiraj novi zadatak)
                const updates = {};
                updates['subtasks/' + subtaskId] = { text: text, completed: false };
                updates['lastChangedAt'] = nowISO;
                updates['lastChangedBy'] = currentUser.uid;
                database.ref('sharedTasks/' + taskKey).update(updates);
            } else {
                const db = getDbRef(currentUser.uid);
                if (db) {
                    db.child(taskKey + '/subtasks/' + subtaskId).set({ text: text, completed: false });
                }
            }
            
            input.value = '';
            showToast('✅ Podzadatak dodat!', 'success');
        };

        window.toggleSubtask = function(taskKey, subId, isShared) {
            if (!currentUser) return;
            
            const task = isShared ? sharedTasksData[taskKey] : allTasks[taskKey];
            if (!task || !task.subtasks || !task.subtasks[subId]) return;
            
            const newStatus = !task.subtasks[subId].completed;
            const nowISO = dateToISO(new Date());
            
            if (isShared) {
                const updates = {};
                updates['subtasks/' + subId + '/completed'] = newStatus;
                updates['lastChangedAt'] = nowISO;
                updates['lastChangedBy'] = currentUser.uid;
                database.ref('sharedTasks/' + taskKey).update(updates);
            } else {
                const db = getDbRef(currentUser.uid);
                if (db) {
                    db.child(taskKey + '/subtasks/' + subId + '/completed').set(newStatus);
                }
            }
        };

        window.deleteSubtask = function(taskKey, subId, isShared) {
            if (!currentUser) return;
            if (!confirm('Obrisati podzadatak?')) return;
            
            const nowISO = dateToISO(new Date());
            
            if (isShared) {
                const updates = {};
                updates['subtasks/' + subId] = null;
                updates['lastChangedAt'] = nowISO;
                updates['lastChangedBy'] = currentUser.uid;
                database.ref('sharedTasks/' + taskKey).update(updates);
            } else {
                const db = getDbRef(currentUser.uid);
                if (db) {
                    db.child(taskKey + '/subtasks/' + subId).remove();
                }
            }
            
            showToast('🗑️ Podzadatak obrisan!', 'success');
        };

        function sortByTime(a, b) {
            const ta = allTasks[a]?.time || '';
            const tb = allTasks[b]?.time || '';
            if (!ta && !tb) return 0;
            if (!ta) return 1;
            if (!tb) return -1;
            return ta.localeCompare(tb);
        }

        function updateButtons() {
            const doneBtn = document.getElementById('doneBtn');
            const trashBtn = document.getElementById('trashBtn');
            
            if (doneBtn) {
                doneBtn.textContent = showDone ? '📋 Aktivni' : '📁 Završeni';
                doneBtn.className = showDone ? 'btn blue' : 'btn gray';
            }
            if (trashBtn) {
                trashBtn.textContent = showTrash ? '📋 Aktivni' : '🗑️ Smeće';
                trashBtn.className = showTrash ? 'btn blue' : 'btn orange';
            }
            
            const info = document.getElementById('doneInfo');
            if (info) {
                if (showDone) info.textContent = '📁 Prikazani završeni zadaci';
                else if (showTrash) info.textContent = '🗑️ Prikazano smeće (zadaci se brišu nakon 30 dana)';
                else info.textContent = '';
            }
        }

        // ===== FILTERI =====
        window.setCat = function(category) {
            filterCategory = category;
            filterDate = null;
            showDone = false;
            showTrash = false;
            
            if (category === 'Deljeni') {
                localStorage.setItem('mp_last_viewed_shared', Date.now().toString());
                setTimeout(function() {
                    if (filterCategory === 'Deljeni') renderTasks();
                }, 3000);
            }
            renderTasks();
        };

        window.clearFilter = function() {
            filterCategory = 'Sve';
            filterDate = null;
            showDone = false;
            showTrash = false;
            renderTasks();
        };

        window.filterByDate = function(dateStr) {
            filterDate = dateStr;
            filterCategory = 'Sve';
            renderTasks();
        };

        window.setSortMode = function(mode) {
            sortMode = mode;
            renderTasks();
        };

        window.toggleDoneView = function() {
            showDone = !showDone;
            showTrash = false;
            filterCategory = 'Sve';
            renderTasks();
        };

        window.toggleTrashView = function() {
            showTrash = !showTrash;
            showDone = false;
            filterCategory = 'Sve';
            renderTasks();
        };

        // ===== RAD SA ZADACIMA =====
        window.toggleComplete = function(key) {
            const task = allTasks[key];
            if (!task) return;
            
            if (!currentUser) return;
            
            const db = getDbRef(currentUser.uid);
            const nowISO = dateToISO(new Date());
            
            // Ako je deljeni zadatak sa ponavljanjem
            if (task.sharedKey && task.repeat && task.repeat !== 'none' && task.time) {
                const nextDate = calculateNextDate(task.time, task.repeat);
                if (nextDate) {
                    const sharedRef = database.ref('sharedTasks/' + task.sharedKey);
                    sharedRef.once('value').then(function(snap) {
                        const sharedData = snap.val();
                        if (sharedData) {
                            const newSharedRef = database.ref('sharedTasks').push();
                            const newSharedKey = newSharedRef.key;
                            
                            const newTask = {
                                text: task.text,
                                category: task.category,
                                time: nextDate,
                                repeat: task.repeat,
                                completed: false,
                                deleted: false,
                                createdAt: nowISO,
                                lastChangedAt: nowISO,
                                lastChangedBy: currentUser.uid,
                                participants: sharedData.participants || {},
                                createdBy: sharedData.createdBy || currentUser.uid,
                                createdByEmail: sharedData.createdByEmail || currentUser.email,
                                createdByNickname: sharedData.createdByNickname || currentNickname || '',
                                subtasks: task.subtasks || {},
                                alarm: task.alarm !== false
                            };
                            
                            newSharedRef.set(newTask).then(function() {
                                const updates = {};
                                if (sharedData.participants) {
                                    Object.keys(sharedData.participants).forEach(function(uid) {
                                        updates['users/' + uid + '/sharedTaskRefs/' + newSharedKey] = true;
                                    });
                                }
                                updates['users/' + currentUser.uid + '/sharedTaskRefs/' + newSharedKey] = true;
                                updates['sharedTasks/' + task.sharedKey] = null;
                                
                                database.ref().update(updates).then(function() {
                                    showToast('Zadatak ponovljen za ' + task.repeat, 'success');
                                });
                            });
                        }
                    });
                    return;
                }
            }
            
            // Ako je običan zadatak sa ponavljanjem
            if (task.repeat && task.repeat !== 'none' && task.time && !task.sharedKey) {
                const nextDate = calculateNextDate(task.time, task.repeat);
                if (nextDate) {
                    const newTask = {
                        text: task.text,
                        category: task.category,
                        time: nextDate,
                        repeat: task.repeat,
                        completed: false,
                        deleted: false,
                        createdAt: task.createdAt || nowISO,
                        alarm: task.alarm !== false
                    };
                    
                    if (navigator.onLine) {
                        db.push(newTask);
                        db.child(key).remove();
                    } else {
                        addToQueue({ type: 'push', payload: newTask });
                        addToQueue({ type: 'remove', key: key });
                    }
                    showToast('Zadatak ponovljen za ' + task.repeat, 'success');
                    return;
                }
            }
            
            const isCompleted = !task.completed;
            const updates = {
                completed: isCompleted,
                completedAt: isCompleted ? nowISO : ''
            };
            
            if (task.sharedKey) {
                const sharedUpdates = {
                    completed: isCompleted,
                    completedAt: isCompleted ? nowISO : '',
                    lastChangedAt: nowISO,
                    lastChangedBy: currentUser.uid
                };
                database.ref('sharedTasks/' + task.sharedKey).update(sharedUpdates);
            }
            
            if (navigator.onLine) {
                db.child(key).update(updates);
            } else {
                addToQueue({ type: 'update', key: key, payload: updates });
            }
        };

        window.restoreFromDone = function(key) {
            if (!currentUser) return;
            
            const updates = {
