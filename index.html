<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moj Planer</title>
  <style>
    :root{--bg:#060a12;--panel:#132033;--text:#f4f7fb;--muted:#9fb0c7;--blue:#3498db;--green:#2ecc71;--red:#e74c3c;--yellow:#f1c40f;--teal:#1abc9c;--shadow:0 16px 38px rgba(0,0,0,.45);--radius:18px}
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(180deg,#03070d 0%,#060a12 100%);color:var(--text)}
    .wrap{max-width:1400px;margin:0 auto;padding:14px;display:grid;grid-template-columns:330px 1fr;gap:14px;height:100vh;overflow:hidden}
    .left,.right{min-width:0}
    .left{display:flex;flex-direction:column;gap:12px;overflow:auto;padding-right:2px}
    .right{display:flex;flex-direction:column;gap:14px;overflow:hidden}
    .panel{background:rgba(19,32,51,.96);border:1px solid rgba(52,152,219,.18);border-radius:var(--radius);box-shadow:var(--shadow)}
    .section{padding:14px 16px}
    .btn{border:none;border-radius:12px;padding:11px 12px;color:#fff;cursor:pointer;font-weight:700;transition:.2s ease;user-select:none}
    .btn:active{transform:scale(.98)}
    .btn.small{padding:8px 10px;font-size:12px;border-radius:10px}
    .btn.green{background:linear-gradient(180deg,#2ecc71,#22b15a)}
    .btn.gray{background:linear-gradient(180deg,#34495e,#273647)}
    .btn.red{background:linear-gradient(180deg,#c0392b,#a5281d)}
    .btn.blue{background:linear-gradient(180deg,#3498db,#246fb0)}
    .btn.teal{background:linear-gradient(180deg,#1abc9c,#16a085)}
    .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
    .chip{border:none;cursor:pointer;border-radius:999px;padding:7px 11px;background:#22344d;color:#fff;font-size:12px;font-weight:700}
    .calendar{padding:14px}
    .cal-head{text-align:center;font-weight:800;margin-bottom:10px;color:#dbe9ff}
    .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
    .dayname{font-size:11px;color:#7fb7ea;font-weight:800;padding-bottom:3px}
    .day{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#21324a;border-radius:10px;cursor:pointer;font-size:12px;position:relative;min-height:40px}
    .day.today{background:#1f8f4b;font-weight:800}
    .day.sel{outline:2px solid var(--blue);background:#2b4566}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);box-shadow:0 0 4px var(--yellow);margin-top:2px}
    .form{padding:16px;flex-shrink:0}
    .form-top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .title{font-size:15px;font-weight:800;margin:0}
    textarea,select,input[type="datetime-local"],input[type="text"],input[type="email"],input[type="password"]{width:100%;border:none;outline:none;border-radius:12px;background:#0f1a2b;color:#fff;padding:11px 12px;border:1px solid rgba(52,152,219,.35);font-size:14px}
    textarea{min-height:78px;resize:none}
    .input-row{display:grid;grid-template-columns:1.1fr 1.1fr 1.2fr;gap:8px;margin-bottom:8px}
    .save-row{display:flex;gap:8px;align-items:stretch}
    .save-row .btn{flex:1}
    .offline{display:none;margin-bottom:8px;background:#8e44ad;color:#fff;text-align:center;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:800}
    .toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
    .tasks{flex:1;overflow:auto;padding-right:2px}
    .task{background:linear-gradient(180deg,#1a2940,#162338);border:1px solid rgba(255,255,255,.06);border-left:6px solid var(--blue);border-right:6px solid var(--blue);border-radius:16px;padding:12px 12px 11px;margin-bottom:12px;box-shadow:0 10px 20px rgba(0,0,0,.26)}
    .task.alarm{border-left-color:var(--yellow);border-right-color:var(--yellow)}
    .task.done{opacity:.55;border-left-color:#7f8c8d!important;border-right-color:#7f8c8d!important}
    .task.shared-task{border-left-color:var(--teal)!important;border-right-color:var(--teal)!important}
    .task-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px;color:#88a7c6;margin-bottom:8px}
    .task-text{white-space:pre-wrap;line-height:1.45;font-size:15px;margin-bottom:10px}
    .task-meta{font-size:12px;color:#9eb7cf;margin-bottom:8px}
    .alarm-banner{background:var(--yellow);color:#000;font-weight:900;border-radius:10px;padding:6px 10px;margin-bottom:8px;text-align:center;font-size:13px}
    .actions{display:flex;justify-content:flex-end;gap:8px;border-top:1px solid rgba(255,255,255,.08);padding-top:9px}
    .iconbtn{width:36px;height:32px;border:none;border-radius:8px;cursor:pointer;color:#fff;font-weight:800;font-size:14px}
    .loginOverlay{position:fixed;inset:0;z-index:9999;background:linear-gradient(180deg,#03070d 0%,#060a12 100%);display:flex;align-items:center;justify-content:center;padding:20px}
    .login-box{background:rgba(19,32,51,.98);border:1px solid rgba(52,152,219,.3);border-radius:22px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
    .login-title{text-align:center;font-size:22px;font-weight:800;margin:0 0 6px;color:#f4f7fb}
    .login-sub{text-align:center;font-size:13px;color:#9fb0c7;margin:0 0 24px}
    .login-err,.login-ok{font-size:13px;text-align:center;margin-bottom:10px;min-height:18px;font-weight:600}
    .login-err{color:#e74c3c}
    .login-ok{color:#2ecc71}
    .login-switch{text-align:center;font-size:13px;color:#9fb0c7;margin-top:10px}
    .login-switch span{color:#3498db;font-weight:700;text-decoration:underline;cursor:pointer}
    .forgot-link{text-align:center;font-size:12px;color:#7fb7ea;margin-top:8px;cursor:pointer;text-decoration:underline}
    .shared-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid rgba(26,188,156,.3)}
    .shared-header-text{font-size:15px;font-weight:800;color:var(--teal)}
    .mobile-cal{display:none}
    .vis-toggle{font-size:12px;color:#dbe9ff;margin-top:-4px;margin-bottom:10px;text-align:center;opacity:.9}
    @media (max-width:920px){
      .wrap{grid-template-columns:1fr;height:auto;overflow:visible}
      .left,.right{overflow:visible}
      .mobile-cal{display:block}
      .desktop-cal2{display:none}
      .tasks{overflow:visible}
      .toolbar{grid-template-columns:1fr}
      .input-row{grid-template-columns:1fr}
      .save-row{flex-direction:column}
    }
  </style>
</head>
<body>
  <div id="loginOverlay" class="loginOverlay">
    <div class="login-box">
      <h2 class="login-title">☁️ Moj Planer</h2>
      <p class="login-sub" id="loginSubtitle">Prijavite se da nastavite</p>
      <input type="email" id="loginEmail" placeholder="Email adresa" autocomplete="email">
      <input type="password" id="loginPass" placeholder="Šifra" autocomplete="current-password">
      <input type="password" id="loginPass2" placeholder="Ponovite šifru" autocomplete="new-password" style="display:none">
      <div class="login-err" id="loginErr"></div>
      <div class="login-ok" id="loginOk"></div>
      <button class="btn green" id="loginBtn" style="width:100%;padding:13px;font-size:15px">Prijavi se</button>
      <div class="login-switch" id="loginToggle">Nemate nalog? <span>Registrujte se</span></div>
      <div class="forgot-link" id="forgotLink">Zaboravili ste šifru?</div>
    </div>
  </div>

  <div class="wrap">
    <div class="left">
      <div class="panel section" style="padding:12px">
        <button class="btn gray" style="width:100%" id="clearFilterBtn">Sve stavke</button>
      </div>
      <div class="panel calendar" id="cal1"></div>
      <div class="panel calendar desktop-cal2" id="cal2"></div>
      <div class="panel calendar mobile-cal" id="cal2m"></div>
    </div>

    <div class="right">
      <div class="panel form">
        <div class="form-top">
          <button class="btn red small" id="resetBtn">RESET</button>
          <h3 class="title">☁️ Moj Planer <span style="font-size:11px;color:#3498db" id="userEmailLabel"></span></h3>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="text" id="userNickname" placeholder="Vaš nadimak..." style="max-width:130px;padding:5px 8px;font-size:12px;height:30px">
            <button class="btn teal small" id="saveNickBtn" style="padding:6px 9px;height:30px">Sačuvaj</button>
          </div>
          <button class="btn gray small" id="signOutBtn" style="padding:6px 10px">Odjava</button>
        </div>

        <div id="offlineBar" class="offline">Rad bez interneta — sinhronizacija kasnije.</div>
        <div id="cats" class="chips" style="margin-bottom:10px"></div>
        <div class="vis-toggle" id="doneInfo"></div>

        <input id="quickSearch" type="text" placeholder="Pretraga zadataka..." style="margin-bottom:8px">
        <textarea id="taskText" placeholder="Šta treba uraditi?"></textarea>
        <div class="input-row">
          <select id="taskCat"></select>
          <input type="datetime-local" id="taskTime">
          <select id="taskRepeat">
            <option value="none">Bez ponavljanja</option>
            <option value="daily">Svaki dan</option>
            <option value="weekly">Svake nedelje</option>
            <option value="monthly">Svaki mesec</option>
            <option value="yearly">Svake godine</option>
            <option value="weekdays">Radni dani (pon-pet)</option>
          </select>
        </div>
        <div class="save-row">
          <button id="notifBar" class="btn blue">Notifikacije</button>
          <button id="saveBtn" class="btn green">Sačuvaj</button>
        </div>
      </div>

      <div class="panel section" style="padding:14px 14px 6px">
        <div class="toolbar">
          <button class="btn blue" id="sortTimeBtn">Po vremenu</button>
          <button class="btn blue" id="sortCreatedBtn">Novo prvo</button>
          <button class="btn gray" id="archiveBtn">Arhiva</button>
        </div>
      </div>

      <div class="tasks panel section" id="taskList" style="padding:14px"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "REPLACE_ME",
      authDomain: "REPLACE_ME",
      databaseURL: "REPLACE_ME",
      projectId: "REPLACE_ME",
      storageBucket: "REPLACE_ME",
      messagingSenderId: "REPLACE_ME",
      appId: "REPLACE_ME"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();
    const $ = id => document.getElementById(id);
    const esc = s => String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");

    let currentUser = null;
    let currentNickname = "";
    let dbRef = null;
    let allTasks = {};
    let sharedTasksData = {};
    let sharedTaskListeners = {};
    let sharedRefsRef = null;
    let isRegisterMode = false;
    let filterCat = "Sve";
    let filterDate = null;
    let editKey = null;
    let editSharedKey = null;
    let syncTimer = null;
    let showArchive = false;
    let sortMode = "time";
    let offlineMode = !navigator.onLine;
    let notifiedTasks = new Set();
    let localQueue = JSON.parse(localStorage.getItem("mpqueue") || "[]");

    const categoryDefs = [
      { name: "Sve", emoji: "" },
      { name: "Kola", emoji: "🚗" },
      { name: "Zdravlje", emoji: "❤️" },
      { name: "Kupovina", emoji: "🛒" },
      { name: "Hobi", emoji: "🎨" },
      { name: "Dom", emoji: "🏠" },
      { name: "Posao", emoji: "💼" },
      { name: "Razno", emoji: "📝" }
    ];

    const cats = categoryDefs.map(c => c.name);
    const catEmoji = Object.fromEntries(categoryDefs.map(c => [c.name, c.emoji]));
    const months = ["Januar","Februar","Mart","April","Maj","Jun","Jul","Avgust","Septembar","Oktobar","Novembar","Decembar"];
    const days = ["Po","Ut","Sr","Če","Pe","Su","Ne"];

    const pad = n => String(n).padStart(2, "0");
    const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const displayDate = i => {
      if (!i) return "Bez vremena";
      const [d, t] = i.split("T");
      const [y, m, da] = d.split("-");
      return `${da}.${m}.${y}. ${t ? t.slice(0,5) : ""}`.trim();
    };
    const emailToKey = e => String(e || "").replace(/./g, "_").replace(/#/g, "_");
    const getDb = () => dbRef;
    const getSearch = () => $("quickSearch").value.trim().toLowerCase();

    function setLoginMsg(err = "", ok = "") { $("loginErr").textContent = err; $("loginOk").textContent = ok; }

    function toggleAuthMode() {
      isRegisterMode = !isRegisterMode;
      $("loginSubtitle").textContent = isRegisterMode ? "Napravite novi nalog" : "Prijavite se da nastavite";
      $("loginBtn").textContent = isRegisterMode ? "Registruj se" : "Prijavi se";
      $("loginPass2").style.display = isRegisterMode ? "block" : "none";
      $("forgotLink").style.display = isRegisterMode ? "none" : "block";
      $("loginToggle").innerHTML = isRegisterMode ? `Vec imate nalog? <span>Prijavite se</span>` : `Nemate nalog? <span>Registrujte se</span>`;
      setLoginMsg();
    }

    async function doAuth() {
      const email = $("loginEmail").value.trim().toLowerCase();
      const pass = $("loginPass").value;
      const pass2 = $("loginPass2").value;
      setLoginMsg();
      if (!email || !pass) return setLoginMsg("Unesite email i šifru.");
      try {
        if (isRegisterMode) {
          if (pass.length < 6) return setLoginMsg("Šifra mora imati najmanje 6 karaktera.");
          if (pass !== pass2) return setLoginMsg("Šifre se ne poklapaju.");
          await auth.createUserWithEmailAndPassword(email, pass);
        } else {
          await auth.signInWithEmailAndPassword(email, pass);
        }
      } catch (e) { setLoginMsg(e.message || "Greška"); }
    }

    function doForgotPassword() {
      const email = $("loginEmail").value.trim().toLowerCase();
      setLoginMsg();
      if (!email) return setLoginMsg("Unesite email pa kliknite Zaboravili ste šifru?");
      auth.sendPasswordResetEmail(email).then(() => setLoginMsg("", "Email za reset šifre je poslat!")).catch(e => setLoginMsg(e.message || "Greška"));
    }

    function updateUserLabel() {
      $("userEmailLabel").textContent = currentUser ? (currentNickname || currentUser.email) : "";
      $("userNickname").value = currentNickname || "";
    }

    function cleanupSharedListeners() {
      Object.values(sharedTaskListeners).forEach(r => r && r.off && r.off());
      sharedTaskListeners = {};
      sharedTasksData = {};
      if (sharedRefsRef && sharedRefsRef.off) sharedRefsRef.off();
      sharedRefsRef = null;
    }

    function setupSharedListeners(uid) {
      cleanupSharedListeners();
      sharedRefsRef = db.ref(`users/${uid}/sharedTaskRefs`);
      sharedRefsRef.on("value", snap => {
        const refs = snap.val() || {};
        Object.keys(sharedTaskListeners).forEach(k => {
          if (!refs[k]) {
            sharedTaskListeners[k].off();
            delete sharedTaskListeners[k];
            delete sharedTasksData[k];
          }
        });
        Object.keys(refs).forEach(k => {
          if (!sharedTaskListeners[k]) {
            const ref = db.ref(`sharedTasks/${k}`);
            sharedTaskListeners[k] = ref;
            ref.on("value", s => {
              if (s.val()) sharedTasksData[k] = s.val();
              else delete sharedTasksData[k];
              render();
            });
          }
        });
        render();
      });
    }

    function saveNickname() {
      if (!currentUser) return;
      const nick = $("userNickname").value.trim();
      if (!nick) return alert("Unesite nadimak.");
      if (nick.length < 2 || nick.length > 24) return alert("Nadimak mora imati 2 do 24 karaktera.");
      const low = nick.toLowerCase();
      db.ref(`nicknameToUid/${low}`).once("value").then(snap => {
        const existing = snap.val();
        if (existing && existing !== currentUser.uid) return alert("Ovaj nadimak je već zauzet.");
        const updates = {};
        updates[`users/${currentUser.uid}/nickname`] = nick;
        updates[`nicknameToUid/${low}`] = currentUser.uid;
        return db.ref().update(updates);
      }).then(() => {
        currentNickname = nick;
        updateUserLabel();
        render();
      }).catch(e => alert(e.message));
    }

    function queueOp(type, payload) {
      localQueue.push({ type, payload });
      localStorage.setItem("mpqueue", JSON.stringify(localQueue));
    }

    async function flushQueue() {
      if (!navigator.onLine || !localQueue.length) return;
      const q = localQueue.slice();
      localQueue = [];
      localStorage.removeItem("mpqueue");
      for (const op of q) {
        if (op.type === "push") await getDb().push(op.payload);
        if (op.type === "update" && op.payload.key) await getDb().child(op.payload.key).update(op.payload.data);
        if (op.type === "remove" && op.payload.key) await getDb().child(op.payload.key).remove();
        if (op.type === "removeall") await getDb().remove();
      }
    }

    function renderCats() {
      const html = cats.map(c => `<button class="chip" onclick="setCat('${c}')">${catEmoji[c] || ""} ${c}</button>`).join("");
      const sharedMark = Object.keys(sharedTasksData).length ? `(${Object.keys(sharedTasksData).length})` : "";
      $("cats").innerHTML = html + `<button class="chip" style="background:#163d31;color:#1abc9c;border:1px solid rgba(26,188,156,.35)" onclick="setCat('Deljeni')">Deljeni ${sharedMark}</button>`;
      $("taskCat").innerHTML = cats.filter(c => c !== "Sve").map(c => `<option value="${c}">${catEmoji[c] || ""} ${c}</option>`).join("");
    }

    function renderCalendar(id, offset) {
      const el = $(id);
      if (!el) return;
      const d = new Date();
      d.setMonth(d.getMonth() + offset);
      const y = d.getFullYear(), m = d.getMonth();
      const first = new Date(y, m, 1).getDay();
      const start = first === 0 ? 6 : first - 1;
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      let html = `<div class="cal-head">${months[m]} ${y}</div><div class="grid">${days.map(x => `<div class="dayname">${x}</div>`).join("")}`;
      for (let i = 0; i < start; i++) html += "<div></div>";
      for (let i = 1; i <= daysInMonth; i++) {
        const ds = `${y}-${pad(m+1)}-${pad(i)}`;
        const has = Object.values(allTasks).some(t => t.time && t.time.startsWith(ds) && !t.completed);
        const today = new Date().toISOString().split("T")[0] === ds;
        const sel = filterDate === ds;
        html += `<div class="day ${today ? "today" : ""} ${sel ? "sel" : ""}" onclick="filterByDate('${ds}')">${i}${has ? "<div class='dot'></div>" : ""}</div>`;
      }
      html += "</div>";
      el.innerHTML = html;
    }

    function initCalendars() {
      renderCalendar("cal1", 0);
      renderCalendar("cal2", 1);
      renderCalendar("cal2m", 1);
    }

    function setCat(c) { filterCat = c; filterDate = null; showArchive = false; render(); }
    function clearFilter() { filterCat = "Sve"; filterDate = null; showArchive = false; render(); }
    function filterByDate(ds) { filterDate = ds; filterCat = "Sve"; showArchive = false; render(); }

    function updateNotifBar() {
      const bar = $("notifBar");
      if (!("Notification" in window)) { bar.style.display = "none"; return; }
      if (Notification.permission === "default") {
        bar.style.display = "inline-block";
        bar.textContent = "Notifikacije";
        bar.className = "btn blue";
        bar.onclick = requestNotifPermission;
      } else if (Notification.permission === "denied") {
        bar.style.display = "inline-block";
        bar.textContent = "Blokirano";
        bar.className = "btn gray";
        bar.onclick = null;
      } else {
        bar.style.display = "inline-block";
        bar.textContent = "PUSH AKTIVNE";
        bar.className = "btn green";
        bar.onclick = null;
      }
    }

    function requestNotifPermission() {
      if (!("Notification" in window)) return;
      Notification.requestPermission().then(p => {
        updateNotifBar();
        if (p === "granted") checkAndNotify();
      });
    }

    function showPushNotification(title, body, tag) {
      const opts = { body, icon: "favicon.ico", tag, renotify: true };
      if ("serviceWorker" in navigator) navigator.serviceWorker.ready.then(reg => reg.showNotification(title, opts)).catch(() => new Notification(title, opts));
      else new Notification(title, opts);
    }

    function checkAndNotify() {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const now = new Date();
      const in24 = new Date(now.getTime() + 86400000);
      const in48 = new Date(now.getTime() + 172800000);
      Object.keys(allTasks).forEach(k => {
        const t = allTasks[k];
        if (!t || t.completed || !t.time) return;
        const tt = new Date(t.time);
        if (tt <= now && !notifiedTasks.has(k)) {
          notifiedTasks.add(k);
          showPushNotification("Moj Planer - VREME JE!", `${catEmoji[t.category] || ""} ${t.text}`, `alarm-${k}`);
        }
        if (tt > now && tt <= in24 && !notifiedTasks.has(k + "1")) {
          notifiedTasks.add(k + "1");
          showPushNotification("Sutra vas čeka zadatak", `${catEmoji[t.category] || ""} ${t.text} - ${displayDate(t.time)}`, `sutra-${k}`);
        }
        if (tt > in24 && tt <= in48 && !notifiedTasks.has(k + "2")) {
          notifiedTasks.add(k + "2");
          showPushNotification("Za 2 dana vas čeka zadatak", `${catEmoji[t.category] || ""} ${t.text} - ${displayDate(t.time)}`, `dvadan-${k}`);
        }
      });
    }

    function setupSync() { if (syncTimer) clearInterval(syncTimer); syncTimer = setInterval(render, 5 * 60000); }

    function addTask() {
      const text = $("taskText").value.trim();
      const time = $("taskTime").value;
      const category = $("taskCat").value;
      const repeat = $("taskRepeat").value;
      if (!text) return;
      if (!["none","daily","weekly","monthly","yearly","weekdays"].includes(repeat)) return alert("Neispravno ponavljanje.");

      if (editSharedKey) {
        db.ref(`sharedTasks/${editSharedKey}`).update({ text, time, category, repeat });
        editSharedKey = null;
        $("saveBtn").textContent = "Sačuvaj";
        $("taskText").value = "";
        $("taskTime").value = "";
        $("taskRepeat").value = "none";
        return;
      }

      const payload = { text, time, category, repeat, completed: false, createdAt: iso(new Date()) };

      if (editKey) {
        const data = { text, time, category, repeat };
        if (offlineMode) queueOp("update", { key: editKey, data });
        else getDb().child(editKey).update(data);
        editKey = null;
        $("saveBtn").textContent = "Sačuvaj";
      } else if (offlineMode) {
        queueOp("push", payload);
      } else {
        getDb().push(payload);
      }

      $("taskText").value = "";
      $("taskTime").value = "";
      $("taskRepeat").value = "none";
    }

    function shiftRepeatTime(t) {
      if (!t.time) return "";
      const d = new Date(t.time);
      if (t.repeat === "daily") d.setDate(d.getDate() + 1);
      else if (t.repeat === "weekly") d.setDate(d.getDate() + 7);
      else if (t.repeat === "monthly") d.setMonth(d.getMonth() + 1);
      else if (t.repeat === "yearly") d.setFullYear(d.getFullYear() + 1);
      else if (t.repeat === "weekdays") { do { d.setDate(d.getDate() + 1); } while ([0,6].includes(d.getDay())); }
      return iso(d);
    }

    function toggleComplete(k) {
      const t = allTasks[k];
      if (!t) return;
      if (t.repeat && t.repeat !== "none" && t.time) {
        const pd = { text: t.text, category: t.category, time: shiftRepeatTime(t), repeat: t.repeat, completed: false, createdAt: t.createdAt };
        if (offlineMode) { queueOp("push", pd); queueOp("remove", { key: k }); delete allTasks[k]; render(); }
        else { getDb().push(pd); getDb().child(k).remove(); }
      } else {
        const data = !t.completed ? { completed: true } : { completed: false };
        if (offlineMode) queueOp("update", { key: k, data });
        else getDb().child(k).update(data);
      }
    }

    function duplicateTask(k) {
      const t = allTasks[k];
      if (!t) return;
      const data = { text: t.text, time: t.time, category: t.category, repeat: t.repeat || "none", completed: false, createdAt: iso(new Date()) };
      if (offlineMode) queueOp("push", data);
      else getDb().push(data);
    }

    function prepareEdit(k) {
      const t = allTasks[k];
      if (!t) return;
      editKey = k;
      editSharedKey = null;
      $("taskText").value = t.text;
      $("taskTime").value = t.time || "";
      $("taskCat").value = t.category || "Razno";
      $("taskRepeat").value = t.repeat || "none";
      $("saveBtn").textContent = "Izmeni";
      $("taskText").focus();
    }

    function removeTask(k) {
      if (offlineMode) { queueOp("remove", { key: k }); delete allTasks[k]; render(); }
      else getDb().child(k).remove();
    }

    function shareTask(k) {
      const t = allTasks[k];
      if (!t) return;
      const userInput = prompt(`Unesite EMAIL ili NADIMAK osobe kojoj želite da pošaljete zadatak:
${t.text.slice(0,60)}`);
      if (!userInput) return;
      const lookup = userInput.trim().toLowerCase();

      if (userInput.includes("@")) {
        if (currentUser && lookup === String(currentUser.email).toLowerCase()) return alert("Ne možete podeliti zadatak sa samim sobom.");
        db.ref(`emailToUid/${emailToKey(lookup)}`).once("value").then(s => {
          const uid = s.val();
          if (!uid) return alert(`Korisnik sa emailom ${userInput} nije pronađen.`);
          executeSharing(t, uid, lookup);
        });
      } else {
        if (currentNickname && lookup === currentNickname.toLowerCase()) return alert("Ne možete podeliti zadatak sa samim sobom.");
        db.ref(`nicknameToUid/${emailToKey(lookup)}`).once("value").then(s => {
          const uid = s.val();
          if (!uid) return alert(`Korisnik sa nadimkom ${userInput} nije pronađen.`);
          executeSharing(t, uid, userInput);
        });
      }
    }

    function executeSharing(t, recipientUid, rawTarget) {
      const newRef = db.ref("sharedTasks").push();
      const participants = {};
      participants[currentUser.uid] = currentNickname || currentUser.email;
      participants[recipientUid] = rawTarget;
      const data = {
        text: t.text,
        category: t.category || "Razno",
        time: t.time || "",
        repeat: t.repeat || "none",
        completed: false,
        createdAt: t.createdAt || iso(new Date()),
        participants,
        createdBy: currentUser.uid,
        createdByEmail: currentUser.email
      };
      newRef.set(data).then(() => {
        const updates = {};
        updates[`users/${currentUser.uid}/sharedTaskRefs/${newRef.key}`] = true;
        updates[`users/${recipientUid}/sharedTaskRefs/${newRef.key}`] = true;
        return db.ref().update(updates);
      }).then(() => alert(`Zadatak uspešno podeljen sa ${rawTarget}`)).catch(e => alert(e.message));
    }

    function toggleSharedComplete(k) {
      const t = sharedTasksData[k];
      if (!t) return;
      db.ref(`sharedTasks/${k}`).update(!t.completed ? { completed: true } : { completed: false });
    }

    function editSharedTask(k) {
      const t = sharedTasksData[k];
      if (!t) return;
      editKey = null;
      editSharedKey = k;
      $("taskText").value = t.text;
      $("taskTime").value = t.time || "";
      $("taskCat").value = t.category || "Razno";
      $("taskRepeat").value = t.repeat || "none";
      $("saveBtn").textContent = "Izmeni deljeni";
      $("taskText").focus();
    }

    function removeSharedRef(k) {
      if (!confirm("Ukloniti ovaj deljeni zadatak iz vašeg prikaza?")) return;
      db.ref(`users/${currentUser.uid}/sharedTaskRefs/${k}`).remove();
    }

    function resetAll() {
      if (!confirm("Obrisati sve sopstvene zadatke?")) return;
      if (offlineMode) queueOp("removeall", {});
      else if (getDb()) getDb().remove();
    }

    function doSignOut() {
      if (confirm("Odjaviti se?")) auth.signOut();
    }

    function render() {
      initCalendars();
      updateUserLabel();
      renderCats();
      updateNotifBar();
      $("offlineBar").style.display = offlineMode ? "block" : "none";
      $("doneInfo").textContent = showArchive ? "Prikazana ARHIVA - završeni zadaci" : "";
      const list = $("taskList");
      list.innerHTML = "";
      const q = getSearch();

      if (filterCat === "Deljeni") {
        const sharedKeys = Object.keys(sharedTasksData);
        list.innerHTML = `<div class="shared-header"><div class="shared-header-text">Deljeni zadaci</div></div>`;
        if (!sharedKeys.length) {
          list.innerHTML += '<div style="text-align:center;color:#9fb0c7;padding:30px">Nemate deljenih zadataka.</div>';
          return;
        }
        sharedKeys.forEach(k => {
          const t = sharedTasksData[k];
          if (!t) return;
          list.innerHTML += `<div class="task shared-task ${t.completed ? "done" : ""}">
            <div class="task-head"><div>${catEmoji[t.category] || ""} ${t.category || "Razno"}</div><div>${t.time ? displayDate(t.time) : "Bez vremena"}</div></div>
            <div class="task-text">${esc(t.text)}</div>
            <div class="actions">
              <button class="iconbtn" style="background:#2ecc71" onclick="toggleSharedComplete('${k}')">✓</button>
              <button class="iconbtn" style="background:#3498db" onclick="editSharedTask('${k}')">✎</button>
              <button class="iconbtn" style="background:#e74c3c" onclick="removeSharedRef('${k}')">✕</button>
            </div>
          </div>`;
        });
        return;
      }

      const keys = Object.keys(allTasks).filter(k => {
        const t = allTasks[k];
        if (!t) return false;
        if (filterCat !== "Sve" && t.category !== filterCat) return false;
        if (filterDate && !(t.time || "").startsWith(filterDate)) return false;
        if (showArchive && !t.completed) return false;
        if (!showArchive && t.completed) return false;
        if (q && !String(t.text || "").toLowerCase().includes(q) && !String(t.category || "").toLowerCase().includes(q)) return false;
        return true;
      });

      const sortFn = sortMode === "created"
        ? (a, b) => String(allTasks[b].createdAt || "").localeCompare(String(allTasks[a].createdAt || ""))
        : (a, b) => String(allTasks[a].time || "zzzz").localeCompare(String(allTasks[b].time || "zzzz"));

      keys.sort(sortFn).forEach(k => {
        const t = allTasks[k];
        const isAlarm = t.time && !t.completed && new Date(t.time) <= new Date();
        const rep = t.repeat && t.repeat !== "none" ? `<div class="task-meta">Ponavljanje: ${t.repeat}</div>` : "";
        list.innerHTML += `<div class="task ${t.completed ? "done" : ""} ${isAlarm ? "alarm" : ""}">
          ${isAlarm ? `<div class="alarm-banner">⏰ VREME JE — ${displayDate(t.time)}</div>` : ""}
          <div class="task-head"><div>${catEmoji[t.category] || ""} ${t.category || "Razno"}</div><div>${t.time ? displayDate(t.time) : "Bez vremena"}</div></div>
          ${rep}
          ${t.createdAt ? `<div class="task-meta">Postavljeno: ${displayDate(t.createdAt)}</div>` : ""}
          ${t.sharedWith ? `<div class="task-meta">Podeljeno sa ${esc(t.sharedWith)}</div>` : ""}
          <div class="task-text">${esc(t.text)}</div>
          <div class="actions">
            <button class="iconbtn" style="background:#2ecc71" onclick="toggleComplete('${k}')">✓</button>
            <button class="iconbtn" style="background:#3498db" onclick="prepareEdit('${k}')">✎</button>
            <button class="iconbtn" style="background:#9b59b6" onclick="duplicateTask('${k}')">⧉</button>
            <button class="iconbtn" style="background:#1abc9c" onclick="shareTask('${k}')">↗</button>
            <button class="iconbtn" style="background:#e74c3c" onclick="removeTask('${k}')">✕</button>
          </div>
        </div>`;
      });

      if (!keys.length) list.innerHTML = '<div style="text-align:center;color:#9fb0c7;padding:30px">Nema stavki.</div>';
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        $("loginOverlay").style.display = "none";
        db.ref(`emailToUid/${emailToKey(user.email.toLowerCase())}`).set(user.uid);
        db.ref(`users/${user.uid}/email`).set(user.email);
        db.ref(`users/${user.uid}/nickname`).on("value", snap => {
          currentNickname = snap.val() || "";
          updateUserLabel();
          render();
        });
        dbRef = db.ref(`users/${user.uid}/tasks`);
        dbRef.on("value", s => {
          allTasks = s.val() || {};
          render();
          setupSharedListeners(user.uid);
          setupSync();
          updateNotifBar();
          if (Notification.permission === "granted") checkAndNotify();
        });
        render();
      } else {
        currentUser = null;
        currentNickname = "";
        $("loginOverlay").style.display = "flex";
        if (dbRef && dbRef.off) dbRef.off();
        dbRef = null;
        cleanupSharedListeners();
        allTasks = {};
        render();
      }
    });

    function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      const sw = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('notificationclick', e => {
          e.notification.close();
          e.waitUntil(clients.matchAll({type:'window'}).then(l => {
            for (const c of l) if (c.focus) return c.focus();
            if (clients.openWindow) return clients.openWindow('/');
          }));
        });
        self.addEventListener('push', e => {
          const d = e.data ? e.data.json() : {};
          e.waitUntil(self.registration.showNotification(d.title || 'Moj Planer', {
            body: d.body || '',
            icon: 'favicon.ico',
            tag: d.tag || 'mp',
            renotify: true
          }));
        });
      `;
      const blob = new Blob([sw], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
    }

    window.toggleAuthMode = toggleAuthMode;
    window.doAuth = doAuth;
    window.doForgotPassword = doForgotPassword;
    window.saveNickname = saveNickname;
    window.setCat = setCat;
    window.clearFilter = clearFilter;
    window.filterByDate = filterByDate;
    window.requestNotifPermission = requestNotifPermission;
    window.addTask = addTask;
    window.toggleComplete = toggleComplete;
    window.duplicateTask = duplicateTask;
    window.prepareEdit = prepareEdit;
    window.removeTask = removeTask;
    window.shareTask = shareTask;
    window.toggleSharedComplete = toggleSharedComplete;
    window.editSharedTask = editSharedTask;
    window.removeSharedRef = removeSharedRef;
    window.doSignOut = doSignOut;
    window.resetAll = resetAll;

    document.addEventListener("DOMContentLoaded", () => {
      document.body.addEventListener("click", e => {
        if (e.target.id === "loginBtn") doAuth();
        if (e.target.id === "forgotLink") doForgotPassword();
        if (e.target.id === "loginToggle" || e.target.closest("#loginToggle")) toggleAuthMode();
        if (e.target.id === "saveNickBtn") saveNickname();
        if (e.target.id === "signOutBtn") doSignOut();
        if (e.target.id === "clearFilterBtn") clearFilter();
        if (e.target.id === "saveBtn") addTask();
        if (e.target.id === "resetBtn") resetAll();
        if (e.target.id === "sortTimeBtn") { sortMode = "time"; render(); }
        if (e.target.id === "sortCreatedBtn") { sortMode = "created"; render(); }
        if (e.target.id === "archiveBtn") { showArchive = !showArchive; render(); }
        if (e.target.id === "notifBar") requestNotifPermission();
      });

      $("quickSearch").addEventListener("input", render);
      document.addEventListener("keydown", e => {
        if (e.key === "Escape") {
          editKey = null;
          editSharedKey = null;
          $("saveBtn").textContent = "Sačuvaj";
        }
      });

      registerServiceWorker();
      updateNotifBar();
      render();
    });

    window.addEventListener("online", async () => {
      offlineMode = false;
      await flushQueue();
      render();
    });

    window.addEventListener("offline", () => {
      offlineMode = true;
      render();
    });

    setInterval(checkAndNotify, 60000);
  </script>
</body>
</html>
