        function executeSharing(key, taskObj, recipientUid, rawTarget) {
            const db = database;
            const nowISO = dateToISO(new Date());
            const myInfo = currentNickname ? currentNickname + ' (' + currentUser.email + ')' : currentUser.email;
            
            // Ako zadatak već ima sharedKey (već je deljen)
            if (taskObj.sharedKey) {
                const sharedKey = taskObj.sharedKey;
                db.ref('sharedTasks/' + sharedKey + '/participants').once('value')
                    .then(function(snap) {
                        const currentParticipants = snap.val() || {};
                        if (currentParticipants[recipientUid]) {
                            showToast('Ovaj korisnik je već učesnik u ovom zadatku!', 'warning');
                            return;
                        }
                        
                        const updates = {};
                        updates['sharedTasks/' + sharedKey + '/participants/' + recipientUid] = rawTarget;
                        updates['sharedTasks/' + sharedKey + '/lastChangedAt'] = nowISO;
                        updates['sharedTasks/' + sharedKey + '/lastChangedBy'] = currentUser.uid;
                        updates['users/' + recipientUid + '/sharedTaskRefs/' + sharedKey] = true;
                        
                        const staroDeljenje = taskObj.sharedWith || '';
                        updates['users/' + currentUser.uid + '/tasks/' + key + '/sharedWith'] = 
                            staroDeljenje ? staroDeljenje + ', ' + rawTarget : rawTarget;
                        
                        return db.ref().update(updates);
                    })
                    .then(function() {
                        showToast('Korisnik ' + rawTarget + ' dodat u deljeni zadatak!', 'success');
                    })
                    .catch(function(err) {
                        console.error('Greška pri dodavanju učesnika:', err);
                        showToast('Greška: ' + err.message, 'error');
                    });
                return;
            }
            
            // KREIRANJE NOVOG DELJENOG ZADATKA - KOPIRAJ SVE!
            const newRef = db.ref('sharedTasks').push();
            const newKey = newRef.key;
            const participants = {};
            participants[currentUser.uid] = myInfo;
            participants[recipientUid] = rawTarget;
            
            const taskData = {
                text: taskObj.text,
                category: taskObj.category || 'Razno',
                time: taskObj.time || '',
                repeat: taskObj.repeat || 'none',
                completed: false,
                deleted: false,
                createdAt: taskObj.createdAt || nowISO,
                lastChangedAt: nowISO,
                lastChangedBy: currentUser.uid,
                participants: participants,
                createdBy: currentUser.uid,
                createdByEmail: currentUser.email,
                createdByNickname: currentNickname || '',
                subtasks: taskObj.subtasks || {},  // KOPIRAJ PODZADATKE!
                alarm: taskObj.alarm !== false      // KOPIRAJ ALARM!
            };
            
            newRef.set(taskData)
                .then(function() {
                    const updates = {};
                    updates['users/' + currentUser.uid + '/sharedTaskRefs/' + newKey] = true;
                    updates['users/' + recipientUid + '/sharedTaskRefs/' + newKey] = true;
                    updates['users/' + currentUser.uid + '/tasks/' + key + '/sharedKey'] = newKey;
                    updates['users/' + currentUser.uid + '/tasks/' + key + '/sharedWith'] = rawTarget;
                    return db.ref().update(updates);
                })
                .then(function() {
                    // Obriši stari lokalni zadatak (sada je deljeni)
                    const dbRef = getDbRef(currentUser.uid);
                    if (dbRef && navigator.onLine) {
                        dbRef.child(key).remove();
                    }
                    showToast('Zadatak uspešno podeljen sa: ' + rawTarget, 'success');
                })
                .catch(function(err) {
                    console.error('Greška pri deljenju:', err);
                    showToast('Greška: ' + err.message, 'error');
                });
        }

        // ============================================================
        //  SHARED LISTENERS
        // ============================================================
        function setupSharedListeners(uid) {
            sharedRefsRef = database.ref('users/' + uid + '/sharedTaskRefs');
            sharedRefsRef.on('value', function(snap) {
                const refs = snap.val() || {};
                
                Object.keys(sharedTaskListeners).forEach(function(k) {
                    if (!refs[k]) {
                        sharedTaskListeners[k].off();
                        delete sharedTaskListeners[k];
                        delete sharedTasksData[k];
                        Object.keys(allTasks).forEach(function(key) {
                            if (allTasks[key] && allTasks[key].sharedKey === k) {
                                delete allTasks[key];
                            }
                        });
                    }
                });
                
                Object.keys(refs).forEach(function(k) {
                    if (!sharedTaskListeners[k]) {
                        const ref = database.ref('sharedTasks/' + k);
                        ref.on('value', function(s) {
                            if (s.val()) {
                                sharedTasksData[k] = s.val();
                                syncSharedTaskToLocal(k, s.val());
                            } else {
                                delete sharedTasksData[k];
                                syncSharedTaskToLocal(k, null);
                            }
                            renderTasks();
                        });
                        sharedTaskListeners[k] = ref;
                    }
                });
                renderTasks();
            });
        }

        function cleanupSharedListeners() {
            if (sharedRefsRef) {
                sharedRefsRef.off();
                sharedRefsRef = null;
            }
            Object.keys(sharedTaskListeners).forEach(function(k) {
                sharedTaskListeners[k].off();
            });
            sharedTaskListeners = {};
            sharedTasksData = {};
        }

        window.doMigrate = function() {

                const old = snap.val();
                if (!old) return;
                
                const newRef = database.ref('users/' + currentUser.uid + '/tasks');
                newRef.once('value', function(ns) {
                    const existingCount = Object.keys(ns.val() || {}).length;
                    const oldCount = Object.keys(old).length;
                    
                    if (!confirm('Prebaciti ' + oldCount + ' starih zadataka?\n\nVeć imate ' + existingCount + ' zadataka - biće DODATI.')) {
                        return;
                    }
                    
                    Object.keys(old).forEach(function(key) {
                        if (old[key].alarm === undefined) old[key].alarm = true;
                    });
                    
                    newRef.update(old).then(function() {
                        database.ref('tasks').remove();
                        document.getElementById('migrationBar').style.display = 'none';
                        showToast('Zadaci su uspešno prebačeni!', 'success');
                        renderTasks();
