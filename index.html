<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Moj Planer - Bojan v8.7</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; }

        /* =====================================================
           DESKTOP LAYOUT (> 900px)
           Stranica se NE skroluje — samo lista zadataka se skroluje
           Leva kolona: oba kalendara (fiksna)
           Desna kolona: forma (fiksna) + lista zadataka (skroluje)
        ===================================================== */
        .page-wrap {
            display: flex;
            height: 100vh;
            padding: 15px;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* Leva kolona — oba kalendara, scrollable samo ako su viši od ekrana */
        .left-col {
            width: 350px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3498db #1a2a44;
        }
        .left-col::-webkit-scrollbar { width: 4px; }
        .left-col::-webkit-scrollbar-thumb { background: #3498db; border-radius: 4px; }

        /* Desna kolona — forma gore (fiksna), lista dole (skroluje) */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 0;
            overflow: hidden;
        }

        /* Forma — fiksna, ne skroluje */
        .form-section {
            background: #2a3a54;
            padding: 18px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        /* Lista zadataka — skroluje unutar svog prostora */
        .list-section {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3498db #1a2a44;
            padding-right: 4px;
        }
        .list-section::-webkit-scrollbar { width: 5px; }
        .list-section::-webkit-scrollbar-thumb { background: #3498db; border-radius: 4px; }

        /* cal2 na dnu leve kolone — vidljiv samo na desktopu */
        .cal2-desktop { display: block; }
        /* cal2 na dnu mobilnog — sakriven na desktopu */
        .cal2-mobile  { display: none; }

        /* =====================================================
           MOBILNI LAYOUT (<= 900px)
           Normalan scroll cele stranice
           Redosled: cal1 → forma → lista → cal2
        ===================================================== */
        @media (max-width: 900px) {
            body { padding: 12px; }
            .page-wrap {
                flex-direction: column;
                height: auto;
                overflow: visible;
                padding: 0;
                gap: 12px;
            }
            .left-col {
                width: 100%;
                overflow: visible;
                order: 1;
            }
            /* Na mobilnom sakrijemo cal2 iz leve kolone */
            .cal2-desktop { display: none; }
            .cal2-mobile  { display: block; order: 4; }

            .right-col {
                overflow: visible;
                order: 2;
            }
            .form-section { order: 1; }
            .list-section {
                flex: none;
                overflow: visible;
                order: 2;
            }
            /* Mobile right col */
            .mobile-list-wrap { order: 3; }
        }

        /* === KALENDAR === */
        .calendar-box { background: #2a3a54; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .day-name { font-size: 11px; color: #3498db; font-weight: bold; padding-bottom: 4px; }
        .day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #3a4a64; border-radius: 7px; font-size: 12px; cursor: pointer; }
        .day.selected { border: 2px solid #3498db; background: #4a5a74; }
        .day.today { background: #2ecc71; color: white; font-weight: bold; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 2px; background: #f1c40f; box-shadow: 0 0 4px #f1c40f; }

        /* === FORMA === */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 6px; }
        textarea { width: 100%; padding: 10px 12px; margin-bottom: 8px; border-radius: 10px; border: 2px solid #3498db; background: #1a2a44; color: white; font-size: 15px; min-height: 70px; resize: none; }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        select, input[type="datetime-local"] { flex: 1; min-width: 110px; padding: 8px 10px; border-radius: 8px; border: 2px solid #3498db; background: #3a4a64; color: white; }
        .save-row { display: flex; gap: 8px; align-items: stretch; }
        #notif-bar { display: none; background: #e67e22; color: #fff; font-size: 12px; font-weight: bold; padding: 6px 10px; border-radius: 10px; cursor: pointer; white-space: nowrap; border: none; flex-shrink: 0; }
        .btn-save { flex: 1; padding: 10px 15px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* === TASK KARTICE === */
        .task-card { background: #3a4a64; padding: 13px 15px; border-radius: 14px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; border-left: 6px solid #3498db; border-right: 6px solid #3498db; transition: 0.3s; }
        .task-card.alarm { border-left-color: #f1c40f; border-right-color: #f1c40f; box-shadow: 0 0 20px rgba(241,196,15,0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 12px rgba(241,196,15,0.4); } 50% { box-shadow: 0 0 28px rgba(241,196,15,0.9); } }
        .alarm-banner { background: #f1c40f; color: #000; font-weight: bold; font-size: 13px; padding: 5px 10px; border-radius: 7px; text-align: center; letter-spacing: 1px; }
        .task-card.completed { opacity: 0.5; border-left-color: #7f8c8d !important; border-right-color: #7f8c8d !important; animation: none !important; }

        .cat-Kola       { border-left-color: #e67e22; border-right-color: #e67e22; }
        .cat-Zdravlje   { border-left-color: #e74c3c; border-right-color: #e74c3c; }
        .cat-Kupovina   { border-left-color: #27ae60; border-right-color: #27ae60; }
        .cat-Razonoda   { border-left-color: #9b59b6; border-right-color: #9b59b6; }
        .cat-Stanovanje { border-left-color: #f39c12; border-right-color: #f39c12; }
        .cat-Posao      { border-left-color: #2980b9; border-right-color: #2980b9; }
        .cat-Razno      { border-left-color: #95a5a6; border-right-color: #95a5a6; }

        .date-text { color: #00d2ff; font-weight: bold; }
        .meta-row { font-size: 11px; color: #3498db; }
        .meta-label { color: #8899aa; }
        .completed-time { color: #2ecc71; font-weight: bold; }
        .task-text-content { font-size: 15px; line-height: 1.4; white-space: pre-wrap; }
        .task-actions { display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        .action-btn { width: 46px; height: 32px; border-radius: 7px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- LEVA KOLONA: dugmad + tekući mesec + sledeći mesec (desktop) -->
    <div class="left-col">
        <button onclick="downloadLatest()" style="padding:9px; background:#27ae60; color:white; border:none; border-radius:10px; cursor:pointer; width:100%; font-weight:bold;">⬇ Preuzmi najnoviju verziju</button>
        <button onclick="clearFilter()" style="padding:9px; background:#34495e; color:white; border:none; border-radius:10px; cursor:pointer; width:100%;">📅 Prikaži sve zadatke</button>
        <div id="cal1" class="calendar-box"></div>
        <!-- cal2 ostaje u levoj koloni samo na desktopu -->
        <div id="cal2" class="calendar-box cal2-desktop"></div>
    </div>

    <!-- DESNA KOLONA: forma (gore, fiksna) + lista zadataka (skroluje) -->
    <div class="right-col">

        <!-- FORMA -->
        <div class="form-section">
            <div class="header-row">
                <button onclick="resetAll()" style="background:#c0392b; color:white; border:none; padding:7px 11px; border-radius:8px; cursor:pointer;">⚠️ RESET</button>
                <h3 style="margin:0; font-size:15px;">☁️ Moj Planer <span style="font-size:10px; color:#3498db; font-weight:normal;">v8.7</span></h3>
                <select id="syncInt" onchange="setupSync()" style="background:#3a4a64; color:white; border:1px solid #3498db; border-radius:5px; padding: 2px 5px; font-size:12px;">
                    <option value="1">1 min</option>
                    <option value="5" selected>5 min</option>
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="60">60 min</option>
                </select>
            </div>
            <div id="cats" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; justify-content:center;"></div>
            <textarea id="taskText" placeholder="Šta treba uraditi?"></textarea>
            <div class="input-row">
                <select id="taskCat"></select>
                <input type="datetime-local" id="taskTime">
                <select id="taskRepeat">
                    <option value="none">Bez ponavljanja</option>
                    <option value="daily">Svaki dan</option>
                    <option value="weekly">Svake nedelje</option>
                    <option value="monthly">Svaki mesec</option>
                    <option value="yearly">Svake godine</option>
                </select>
            </div>
            <div class="save-row">
                <button id="notif-bar" onclick="requestNotifPermission()">🔔 Notifikacije</button>
                <button class="btn-save" id="saveBtn" onclick="addTask()">💾 Sačuvaj</button>
            </div>
        </div>

        <!-- LISTA ZADATAKA — skroluje se unutar desne kolone -->
        <div class="list-section">
            <div id="taskList"></div>
        </div>

    </div>

    <!-- cal2 na mobilnom — prikazuje se ispod liste, sakriven na desktopu -->
    <div id="cal2m" class="calendar-box cal2-mobile"></div>

</div>
<script>
    function downloadLatest() {
        const url = window.location.href.split('?')[0] + '?v=' + Date.now();
        fetch(url)
            .then(r => r.text())
            .then(html => {
                const a = document.createElement('a');
                a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
                a.download = 'MojPlaner.html';
                a.click();
            })
            .catch(() => alert('Greška pri preuzimanju. Proverite internet konekciju.'));
    }

    const firebaseConfig = { databaseURL: "https://mojplaner-fa083-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('tasks');

    let allTasks = {};
    let filterCat = "Sve", filterDate = null, editKey = null, syncTimer = null;
    let notifiedTasks = new Set();

    const categories = ["Sve", "Kola", "Zdravlje", "Kupovina", "Razonoda", "Stanovanje", "Posao", "Razno"];
    const months = ["Januar", "Februar", "Mart", "April", "Maj", "Jun", "Jul", "Avgust", "Septembar", "Oktobar", "Novembar", "Decembar"];
    const catEmoji = { "Sve":"📋","Kola":"🚗","Zdravlje":"💊","Kupovina":"🛒","Razonoda":"🎮","Stanovanje":"🏠","Posao":"💼","Razno":"📌" };

    // === NOTIFIKACIJE ===
    function requestNotifPermission() {
        if (!('Notification' in window)) return;
        Notification.requestPermission().then(p => { updateNotifBar(); if (p === 'granted') checkAndNotify(); });
    }

    function updateNotifBar() {
        const bar = document.getElementById('notif-bar');
        if (!('Notification' in window)) { bar.style.display = 'none'; return; }
        if (Notification.permission === 'default') {
            bar.style.display = 'inline-block'; bar.style.background = '#e67e22';
            bar.title = 'Klikni da dozvoliš obaveštenja'; bar.textContent = '🔔 Notifikacije';
            bar.onclick = requestNotifPermission;
        } else if (Notification.permission === 'denied') {
            bar.style.display = 'inline-block'; bar.style.background = '#7f8c8d';
            bar.title = 'Blokirano — promeni u podešavanjima browsera'; bar.textContent = '🔕 Blokirano';
            bar.onclick = null;
        } else {
            bar.style.display = 'inline-block'; bar.style.background = '#27ae60';
            bar.title = 'Notifikacije su uključene ✓'; bar.textContent = '🔔 Aktivne';
            bar.onclick = null;
        }
    }

    function checkAndNotify() {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;
        const now = new Date();
        Object.keys(allTasks).forEach(k => {
            const t = allTasks[k];
            if (t.completed) { notifiedTasks.delete(k); return; }
            if (t.time && !notifiedTasks.has(k) && new Date(t.time) <= now) {
                notifiedTasks.add(k);
                try { new Notification('⏰ Moj Planer — Vreme je!', { body: (catEmoji[t.category]||'') + ' ' + t.text }); } catch(e) {}
            }
        });
    }
    setInterval(checkAndNotify, 60000);

    // === INIT ===
    function init() {
        document.getElementById('cats').innerHTML = categories.map(c =>
            `<button onclick="setCat('${c}')" style="padding:5px 10px; border-radius:12px; border:none; background:${filterCat===c?'#3498db':'#3a4a64'}; color:white; cursor:pointer; font-size:12px; font-weight:bold;">${catEmoji[c]} ${c}</button>`
        ).join('');
        document.getElementById('taskCat').innerHTML = categories.filter(c=>c!=="Sve").map(c =>
            `<option value="${c}">${catEmoji[c]} ${c}</option>`
        ).join('');
        setupSync();
        updateNotifBar();
    }

    function setupSync() {
        if(syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(render, parseInt(document.getElementById('syncInt').value) * 60000);
    }

    function setCat(c) { filterCat = c; render(); init(); }
    function clearFilter() { filterDate = null; render(); }

    function formatDisplayDate(isoStr) {
        if(!isoStr) return "Bez vremena";
        const [datePart, timePart] = isoStr.split('T');
        const [y, m, d] = datePart.split('-');
        const time = timePart ? timePart.substring(0,5) : '';
        return `<span class="date-text">${d}.${m}.${y}. u ${time}</span>`;
    }

    function dateToISO(date) {
        const pad = n => String(n).padStart(2,'0');
        return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function renderCalendar(id, offset) {
        const el = document.getElementById(id);
        if (!el) return;
        const d = new Date(); d.setMonth(d.getMonth() + offset);
        const y = d.getFullYear(), m = d.getMonth();
        let h = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">${months[m]} ${y}</div><div class="calendar-grid">`;
        ["Po","Ut","Sr","Če","Pe","Su","Ne"].forEach(n => h += `<div class="day-name">${n}</div>`);
        const firstDay = new Date(y,m,1).getDay();
        const start = firstDay===0 ? 6 : firstDay-1;
        for(let i=0;i<start;i++) h += `<div></div>`;
        for(let i=1; i<=new Date(y,m+1,0).getDate(); i++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const hasTasks = Object.values(allTasks).some(t => t.time && t.time.startsWith(ds) && !t.completed);
            const isToday = new Date().toISOString().split('T')[0]===ds ? 'today' : '';
            h += `<div class="day ${isToday} ${filterDate===ds?'selected':''}" onclick="filterByDate('${ds}')">${i}${hasTasks?'<div class="dot"></div>':''}</div>`;
        }
        el.innerHTML = h + `</div>`;
    }

    function filterByDate(ds) { filterDate = ds; render(); }

    function addTask() {
        const text = document.getElementById('taskText').value;
        const time = document.getElementById('taskTime').value;
        const category = document.getElementById('taskCat').value;
        const repeat = document.getElementById('taskRepeat').value;
        if(!text.trim()) return;
        if(editKey) {
            db.child(editKey).update({ text, time, category, repeat });
            editKey = null;
            document.getElementById('saveBtn').innerText = "💾 Sačuvaj";
        } else {
            db.push({ text, time, category, repeat, completed: false, createdAt: dateToISO(new Date()) });
        }
        document.getElementById('taskText').value = '';
        document.getElementById('taskTime').value = '';
    }

    function toggleComplete(key) {
        const t = allTasks[key];
        if (!t) return;
        if (t.repeat && t.repeat !== 'none' && t.time) {
            let nd = new Date(t.time);
            if (t.repeat==='daily')   nd.setDate(nd.getDate()+1);
            else if (t.repeat==='weekly')  nd.setDate(nd.getDate()+7);
            else if (t.repeat==='monthly') nd.setMonth(nd.getMonth()+1);
            else if (t.repeat==='yearly')  nd.setFullYear(nd.getFullYear()+1);
            db.push({ text:t.text, category:t.category, time:dateToISO(nd), repeat:t.repeat, completed:false, createdAt:t.createdAt||'' });
            db.child(key).remove();
        } else {
            if (!t.completed) db.child(key).update({ completed:true, completedAt:dateToISO(new Date()) });
            else              db.child(key).update({ completed:false, completedAt:'' });
        }
    }

    function render() {
        renderCalendar('cal1', 0);
        renderCalendar('cal2', 1);    // desktop leva kolona
        renderCalendar('cal2m', 1);   // mobilni dno
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        const now = new Date();

        const filtered = Object.keys(allTasks).filter(k => {
            const t = allTasks[k];
            return (filterCat==="Sve" || t.category===filterCat) &&
                   (!filterDate || (t.time && t.time.startsWith(filterDate)));
        });

        const active = filtered.filter(k => !allTasks[k].completed);
        const done   = filtered.filter(k =>  allTasks[k].completed);

        active.sort((a,b) => {
            const ta=allTasks[a].time, tb=allTasks[b].time;
            if(!ta&&!tb) return 0; if(!ta) return -1; if(!tb) return 1;
            return ta.localeCompare(tb);
        });
        done.sort((a,b) => {
            const ta=allTasks[a].completedAt||allTasks[a].time||"9999";
            const tb=allTasks[b].completedAt||allTasks[b].time||"9999";
            return ta.localeCompare(tb);
        });

        [...active,...done].forEach(k => {
            const t = allTasks[k];
            const isAlarm = t.time && !t.completed && new Date(t.time) <= now;
            const emoji = catEmoji[t.category] || '';
            const createdLine = t.createdAt
                ? `<div class="meta-row"><span class="meta-label">Postavljeno: </span>${formatDisplayDate(t.createdAt)}</div>` : '';
            const completedLine = t.completed && t.completedAt
                ? `<div class="meta-row"><span class="meta-label">Završeno: </span><span class="completed-time">${formatDisplayDate(t.completedAt).replace('date-text','completed-time')}</span></div>` : '';
            const alarmBanner = isAlarm ? `<div class="alarm-banner">⏰ VREME JE! — ${formatDisplayDate(t.time)}</div>` : '';
            const catClass = t.completed ? '' : `cat-${t.category}`;

            list.innerHTML += `
            <div class="task-card ${catClass} ${t.completed?'completed':''} ${isAlarm?'alarm':''}">
                ${alarmBanner}
                <div class="meta-row">${emoji} ${t.category} | ${isAlarm?'':formatDisplayDate(t.time)} ${t.repeat&&t.repeat!=='none'?'🔄':''}</div>
                ${createdLine}${completedLine}
                <div class="task-text-content">${t.text}</div>
                <div class="task-actions">
                    <button class="action-btn" style="background:${t.completed?'#7f8c8d':'#2ecc71'};" onclick="toggleComplete('${k}')">${t.completed?'↩':'✓'}</button>
                    <button class="action-btn" style="background:#3498db;" onclick="prepareEdit('${k}')">✏️</button>
                    <button class="action-btn" style="background:#e74c3c;" onclick="db.child('${k}').remove()">✕</button>
                </div>
            </div>`;
        });

        checkAndNotify();
    }

    function prepareEdit(k) {
        const t = allTasks[k];
        editKey = k;
        document.getElementById('taskText').value = t.text;
        document.getElementById('taskTime').value = t.time || "";
        document.getElementById('taskCat').value = t.category;
        document.getElementById('taskRepeat').value = t.repeat || "none";
        document.getElementById('saveBtn').innerText = "✏️ Izmeni";
        // Na mobilnom scroll na vrh, na desktopu scroll lista na vrh
        const ls = document.querySelector('.list-section');
        if (ls && ls.scrollHeight > ls.clientHeight) ls.scrollTop = 0;
        else window.scrollTo({top:0, behavior:'smooth'});
    }

    function resetAll() { if(confirm("Obrisati sve zadatke?")) db.remove(); }

    db.on('value', s => { allTasks = s.val() || {}; render(); });
    init();
</script>
<script src="https://replit-cdn.com/replit-pill/replit-pill.global.js" data-repl-id="08a43774-5f3b-492f-ba29-d8d9655b8ce9"></script></body>
</html>
