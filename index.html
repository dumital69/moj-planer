<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Moj Planer - Bojan v8.4</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000000; color: white; margin: 0; padding: 15px; }
        
        .main-wrapper { display: flex; flex-direction: row; gap: 20px; justify-content: center; max-width: 1300px; margin: 0 auto; align-items: flex-start; }
        
        .calendar-column { width: 350px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .calendar-box { background: #2a3a54; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-size: 11px; color: #3498db; font-weight: bold; padding-bottom: 5px; }
        .day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #3a4a64; border-radius: 8px; font-size: 13px; cursor: pointer; position: relative; }
        .day.selected { border: 2px solid #3498db; background: #4a5a74; }
        .day.today { background: #2ecc71; color: white; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 2px; background: #f1c40f; box-shadow: 0 0 5px #f1c40f; }
        
        .planner-column { background: #2a3a54; padding: 20px; border-radius: 20px; width: 100%; max-width: 550px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); box-sizing: border-box; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #3498db; background: #1a2a44; color: white; font-size: 16px; min-height: 80px; resize: none; box-sizing: border-box; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        select, input { flex: 1; min-width: 120px; padding: 10px; border-radius: 8px; border: 2px solid #3498db; background: #3a4a64; color: white; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; }
        
        .task-card { background: #3a4a64; padding: 15px; border-radius: 15px; margin-top: 15px; display: flex; flex-direction: column; gap: 10px; border-left: 6px solid #3498db; border-right: 6px solid #3498db; transition: 0.3s; }
        .task-card.alarm { border-left-color: #f1c40f; border-right-color: #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 15px rgba(241,196,15,0.4); } 50% { box-shadow: 0 0 30px rgba(241,196,15,0.9); } }
        .alarm-banner { background: #f1c40f; color: #000; font-weight: bold; font-size: 13px; padding: 5px 10px; border-radius: 8px; text-align: center; letter-spacing: 1px; }
        .task-card.completed { opacity: 0.5; border-left-color: #7f8c8d !important; border-right-color: #7f8c8d !important; }

        .cat-Kola       { border-left-color: #e67e22; border-right-color: #e67e22; }
        .cat-Zdravlje   { border-left-color: #e74c3c; border-right-color: #e74c3c; }
        .cat-Kupovina   { border-left-color: #27ae60; border-right-color: #27ae60; }
        .cat-Razonoda   { border-left-color: #9b59b6; border-right-color: #9b59b6; }
        .cat-Stanovanje { border-left-color: #f39c12; border-right-color: #f39c12; }
        .cat-Posao      { border-left-color: #2980b9; border-right-color: #2980b9; }
        .cat-Razno      { border-left-color: #95a5a6; border-right-color: #95a5a6; }
        
        .date-text { color: #00d2ff; font-weight: bold; }
        .meta-row { font-size: 11px; color: #3498db; }
        .meta-label { color: #8899aa; }
        .completed-time { color: #2ecc71; font-weight: bold; }
        
        .task-text-content { font-size: 16px; line-height: 1.4; white-space: pre-wrap; margin-top: 5px; }
        .task-actions { display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .action-btn { width: 50px; height: 35px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: bold; }
        
        @media (max-width: 900px) { .main-wrapper { flex-direction: column; align-items: center; } .calendar-column { width: 100%; } }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="calendar-column">
        <button onclick="downloadLatest()" style="padding:10px; background:#27ae60; color:white; border:none; border-radius:10px; cursor:pointer; width:100%; font-weight:bold;">⬇ Preuzmi najnoviju verziju</button>
        <button onclick="clearFilter()" style="padding:10px; background:#34495e; color:white; border:none; border-radius:10px; cursor:pointer; width:100%;">📅 Prikaži sve zadatke</button>
        <div id="cal1" class="calendar-box"></div>
        <div id="cal2" class="calendar-box"></div>
    </div>
    <div class="planner-column">
        <div class="header-row">
            <button onclick="resetAll()" style="background:#c0392b; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">⚠️ RESET</button>
            <h3 style="margin:0;">☁️ Moj Planer <span style="font-size:10px; color:#3498db; font-weight:normal;">v8.4</span></h3>
            <select id="syncInt" onchange="setupSync()" style="background:#3a4a64; color:white; border:1px solid #3498db; border-radius:5px; padding: 2px 5px;">
                <option value="1">1 min</option>
                <option value="5" selected>5 min</option>
                <option value="15">15 min</option>
                <option value="30">30 min</option>
                <option value="60">60 min</option>
            </select>
        </div>
        <div id="cats" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:15px; justify-content:center;"></div>
        <textarea id="taskText" placeholder="Šta treba uraditi?"></textarea>
        <div class="input-row">
            <select id="taskCat"></select>
            <input type="datetime-local" id="taskTime">
            <select id="taskRepeat">
                <option value="none">Bez ponavljanja</option>
                <option value="daily">Svaki dan</option>
                <option value="weekly">Svake nedelje</option>
                <option value="monthly">Svaki mesec</option>
                <option value="yearly">Svake godine</option>
            </select>
        </div>
        <button class="btn-save" id="saveBtn" onclick="addTask()">Sačuvaj</button>
        <div id="taskList"></div>
    </div>
</div>

<script>
    function downloadLatest() {
        const url = window.location.href.split('?')[0] + '?v=' + Date.now();
        fetch(url)
            .then(r => r.text())
            .then(html => {
                const a = document.createElement('a');
                a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
                a.download = 'MojPlaner.html';
                a.click();
            })
            .catch(() => alert('Greška pri preuzimanju. Proverite internet konekciju.'));
    }

    const firebaseConfig = { databaseURL: "https://mojplaner-fa083-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('tasks');

    let allTasks = {};
    let filterCat = "Sve", filterDate = null, editKey = null, syncTimer = null;
    const categories = ["Sve", "Kola", "Zdravlje", "Kupovina", "Razonoda", "Stanovanje", "Posao", "Razno"];
    const months = ["Januar", "Februar", "Mart", "April", "Maj", "Jun", "Jul", "Avgust", "Septembar", "Oktobar", "Novembar", "Decembar"];
    const catEmoji = { "Sve":"📋", "Kola":"🚗", "Zdravlje":"💊", "Kupovina":"🛒", "Razonoda":"🎮", "Stanovanje":"🏠", "Posao":"💼", "Razno":"📌" };

    function init() {
        document.getElementById('cats').innerHTML = categories.map(c => `<button onclick="setCat('${c}')" style="padding:6px 12px; border-radius:12px; border:none; background:${filterCat===c?'#3498db':'#3a4a64'}; color:white; cursor:pointer; font-size:12px; font-weight:bold;">${catEmoji[c]} ${c}</button>`).join('');
        document.getElementById('taskCat').innerHTML = categories.filter(c => c!=="Sve").map(c => `<option value="${c}">${catEmoji[c]} ${c}</option>`).join('');
        setupSync();
    }

    function setupSync() {
        if(syncTimer) clearInterval(syncTimer);
        const mins = parseInt(document.getElementById('syncInt').value);
        syncTimer = setInterval(render, mins * 60000);
    }

    function setCat(c) { filterCat = c; render(); init(); }
    function clearFilter() { filterDate = null; render(); }

    // Formatira ISO datetime string u "dd.mm.yyyy. u HH:MM"
    function formatDisplayDate(isoStr) {
        if(!isoStr) return "Bez vremena";
        const [datePart, timePart] = isoStr.split('T');
        const [y, m, d] = datePart.split('-');
        const time = timePart ? timePart.substring(0, 5) : '';
        return `<span class="date-text">${d}.${m}.${y}. u ${time}</span>`;
    }

    // Formatira Date objekat u ISO string za čuvanje (YYYY-MM-DDTHH:MM)
    function dateToISO(date) {
        const pad = n => String(n).padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function renderCalendar(id, offset) {
        const d = new Date(); d.setMonth(d.getMonth() + offset);
        const y = d.getFullYear(), m = d.getMonth();
        let h = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">${months[m]} ${y}</div><div class="calendar-grid">`;
        ["Po","Ut","Sr","Če","Pe","Su","Ne"].forEach(n => h += `<div class="day-name">${n}</div>`);
        const firstDay = new Date(y, m, 1).getDay();
        const start = (firstDay === 0) ? 6 : firstDay - 1;
        for(let i=0; i<start; i++) h += `<div></div>`;
        for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const hasTasks = Object.values(allTasks).some(t => t.time && t.time.startsWith(ds) && !t.completed);
            const isToday = new Date().toISOString().split('T')[0] === ds ? 'today' : '';
            h += `<div class="day ${isToday} ${filterDate===ds?'selected':''}" onclick="filterByDate('${ds}')">${i}${hasTasks?'<div class="dot"></div>':''}</div>`;
        }
        document.getElementById(id).innerHTML = h + `</div>`;
    }

    function filterByDate(ds) { filterDate = ds; render(); }

    function addTask() {
        const text = document.getElementById('taskText').value;
        const time = document.getElementById('taskTime').value;
        const category = document.getElementById('taskCat').value;
        const repeat = document.getElementById('taskRepeat').value;
        if(!text.trim()) return;

        if(editKey) {
            // Pri izmeni NE menjamo createdAt
            db.child(editKey).update({ text, time, category, repeat });
            editKey = null;
            document.getElementById('saveBtn').innerText = "Sačuvaj";
        } else {
            // Novo: čuvamo vreme postavljanja
            const createdAt = dateToISO(new Date());
            db.push({ text, time, category, repeat, completed: false, createdAt });
        }
        document.getElementById('taskText').value = '';
        document.getElementById('taskTime').value = '';
    }

    function toggleComplete(key) {
        const t = allTasks[key];
        if (!t) return;

        if (t.repeat && t.repeat !== 'none' && t.time) {
            // Ponavljajući zadatak: kreiraj sledeće ponavljanje, obriši trenutni
            let nextDate = new Date(t.time);
            if (t.repeat === 'daily') nextDate.setDate(nextDate.getDate() + 1);
            else if (t.repeat === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
            else if (t.repeat === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);
            else if (t.repeat === 'yearly') nextDate.setFullYear(nextDate.getFullYear() + 1);
            db.push({
                text: t.text,
                category: t.category,
                time: dateToISO(nextDate),
                repeat: t.repeat,
                completed: false,
                createdAt: t.createdAt || ''
            });
            db.child(key).remove();
        } else {
            if (!t.completed) {
                // Označavamo kao završeno — čuvamo vreme završetka
                const completedAt = dateToISO(new Date());
                db.child(key).update({ completed: true, completedAt });
            } else {
                // Poništavamo završetak — brišemo vreme završetka
                db.child(key).update({ completed: false, completedAt: '' });
            }
        }
    }

    function render() {
        renderCalendar('cal1', 0); renderCalendar('cal2', 1);
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        const now = new Date();

        // Filtriraj zadatke
        const filtered = Object.keys(allTasks).filter(k => {
            const t = allTasks[k];
            return (filterCat === "Sve" || t.category === filterCat) &&
                   (!filterDate || (t.time && t.time.startsWith(filterDate)));
        });

        // Razdvoj aktivne i završene
        const active = filtered.filter(k => !allTasks[k].completed);
        const done   = filtered.filter(k =>  allTasks[k].completed);

        // Aktivni: bez vremena idu PRVI, zatim sa vremenom hronološki
        active.sort((a, b) => {
            const ta = allTasks[a].time;
            const tb = allTasks[b].time;
            if (!ta && !tb) return 0;
            if (!ta) return -1;
            if (!tb) return 1;
            return ta.localeCompare(tb);
        });

        // Završeni: sortiraj po vremenu završetka (prazno ide na kraj)
        done.sort((a, b) => {
            const ta = allTasks[a].completedAt || allTasks[a].time || "9999";
            const tb = allTasks[b].completedAt || allTasks[b].time || "9999";
            return ta.localeCompare(tb);
        });

        [...active, ...done].forEach(k => {
            const t = allTasks[k];
            let isAlarm = false;
            if(t.time && !t.completed) {
                if(new Date(t.time) <= now) isAlarm = true;
            }

            const createdLine = t.createdAt
                ? `<div class="meta-row"><span class="meta-label">Postavljeno: </span>${formatDisplayDate(t.createdAt)}</div>`
                : '';

            const completedLine = t.completed && t.completedAt
                ? `<div class="meta-row"><span class="meta-label">Završeno: </span><span class="completed-time">${formatDisplayDate(t.completedAt).replace('date-text','completed-time')}</span></div>`
                : '';

            const catClass = t.completed ? '' : `cat-${t.category}`;
            const emoji = catEmoji[t.category] || '';
            const alarmBanner = isAlarm ? `<div class="alarm-banner">⏰ VREME JE! — ${formatDisplayDate(t.time)}</div>` : '';
            list.innerHTML += `
            <div class="task-card ${catClass} ${t.completed?'completed':''} ${isAlarm?'alarm':''}">
                ${alarmBanner}
                <div class="meta-row">${emoji} ${t.category} | ${isAlarm ? '' : formatDisplayDate(t.time)} ${t.repeat && t.repeat!=='none'?'🔄':''}</div>
                ${createdLine}
                ${completedLine}
                <div class="task-text-content">${t.text}</div>
                <div class="task-actions">
                    <button class="action-btn" style="background:${t.completed?'#7f8c8d':'#2ecc71'};" onclick="toggleComplete('${k}')">${t.completed?'↩':'✓'}</button>
                    <button class="action-btn" style="background:#3498db;" onclick="prepareEdit('${k}')">✏️</button>
                    <button class="action-btn" style="background:#e74c3c;" onclick="db.child('${k}').remove()">X</button>
                </div>
            </div>`;
        });
    }

    function prepareEdit(k) {
        const t = allTasks[k];
        editKey = k;
        document.getElementById('taskText').value = t.text;
        document.getElementById('taskTime').value = t.time || "";
        document.getElementById('taskCat').value = t.category;
        document.getElementById('taskRepeat').value = t.repeat || "none";
        document.getElementById('saveBtn').innerText = "Izmeni Zadatak";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetAll() { if(confirm("Obrisati sve?")) db.remove(); }
    db.on('value', s => { allTasks = s.val() || {}; render(); });
    init();
</script>
<script src="https://replit-cdn.com/replit-pill/replit-pill.global.js" data-repl-id="08a43774-5f3b-492f-ba29-d8d9655b8ce9"></script></body>
</html>
